  mode: single
- id: '1595445444526'
  alias: Beleuchtung - Wohnzimmer Verkehrslicht an
  description: ''
  trigger:
  - minutes: /1
    platform: time_pattern
  condition:
  - after: 06:00:00
    before: 07:30:00
    condition: time
  - condition: state
    entity_id: group.anwesenheit
    state: home
  - condition: state
    entity_id: binary_sensor.workday_sensor
    state: 'on'
  action:
  - data:
      entity_id: light.stehlampe_wohnzimmer_links
    service: python_script.traffic
  mode: restart
- id: '1595445725384'
  alias: Beleuchtung - Wohnzimmer Verkehrslicht aus
  description: ''
  trigger:
  - entity_id: light.stehlampe_wohnzimmer_links
    platform: state
    to: 'off'
  - at: 07:31:00
    platform: time
  condition: []
  action:
  - data: {}
    entity_id: light.stehlampe_wohnzimmer_links
    service: light.turn_off
  - data: {}
    entity_id: automation.beleuchtung_verkehrslicht_an
    service: homeassistant.turn_off
  mode: restart
- id: '1595446145358'
  alias: Beleuchtung - Wohnzimmer Lightstrip mit Deckenlampe an/aus
  description: ''
  trigger:
  - entity_id: light.wohnzimmer_deckenlampe
    platform: state
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.wohnzimmer_deckenlampe
        state: 'on'
      sequence:
      - data: {}
        entity_id: light.wohnzimmer_lightstrip
        service: light.turn_on
    - conditions:
      - condition: state
        entity_id: light.wohnzimmer_deckenlampe
        state: 'off'
      sequence:
      - data: {}
        entity_id: light.wohnzimmer_lightstrip
        service: light.turn_off
    default: []
  mode: single
- id: '1595446592140'
  alias: Beleuchtung - Bad Spiegellampe mit Deckenlampe an/aus
