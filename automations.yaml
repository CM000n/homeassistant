    entity_id: media_player.bad, media_player.buro, media_player.schlafzimmer, media_player.wohnzimmer
    service: sonos.unjoin
  - data: {}
    entity_id: media_player.bad, media_player.buro, media_player.schlafzimmer, media_player.wohnzimmer
