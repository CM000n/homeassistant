    platform: state
  condition: []
  action:
  - choose:
    - conditions:
      - condition: state
        entity_id: light.shelly_deckenlampe_bad
        state: 'on'
      sequence:
      - data: {}
        entity_id: light.shelly_badspiegel
        service: light.turn_on
    - conditions:
      - condition: state
        entity_id: light.shelly_deckenlampe_bad
        state: 'off'
      sequence:
      - data: {}
        entity_id: light.shelly_badspiegel
