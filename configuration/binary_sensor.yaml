
#https://home-assistant.io/components/binary_sensor/

####################################################
#                                                  #
#           Binary Device Trackers                 #
#                                                  #
####################################################

# https://home-assistant.io/components/binary_sensor/

  - platform: template
    sensors:
      openmediavault:
        friendly_name: "Server"
        value_template: >-
          {{ is_state('device_tracker.openmediavault', 'home') }}
      philipstv:
        friendly_name: "Philips-TV"
        value_template: >-
          {{ is_state('device_tracker.philipstv', 'home') }}
      simondrucker:
        friendly_name: "Drucker"
        value_template: >-
          {{ is_state('device_tracker.simondrucker', 'home') }}
      simonlaptop:
        friendly_name: "Laptop"
        value_template: >-
          {{ is_state('device_tracker.simonlaptop', 'home') }}
      waschmaschine:
        friendly_name: "Waschmaschine"
        value_template: >-
          {{ is_state('sensor.status_waschmaschine', 'Wäscht') }}
      trockner:
        friendly_name: "Trockner"
        value_template: >-
          {{ is_state('sensor.status_trockner', 'Trocknet') }}
      spuehlmaschine:
        friendly_name: "Spülmaschine"
        value_template: >-
          {{ not is_state('sensor.status_spuelmaschine', 'Aus') }}

####################################################
#                                                  #
#                Workday Sensor                    #
#                                                  #
####################################################

# https://www.home-assistant.io/integrations/workday/

  - platform: workday
    country: DE
    workdays: [mon, tue, wed, thu, fri]
    excludes: [sat, sun, holiday]

####################################################
#                                                  #
#          END OF CONFIGURATION FILE               #
#                                                  #
####################################################
