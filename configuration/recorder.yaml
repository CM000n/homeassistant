  purge_interval: 1
  purge_keep_days: 7
  db_url: !secret db_url
  include:
    domains:
      - sensor
      - binary_sensor
      - media_player
      - climate
      - light
    entities:
      - switch.simon_pc
      - switch.ventilator
      - switch.wasserpumpe
      - person.lisa
      - person.simon
      - calendar.arbeit
