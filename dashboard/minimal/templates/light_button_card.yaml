---
light_button_card:
  card:
    type: "vertical-stack"
    cards:
      - type: "custom:button-card"
        entity: "[[entity]]"
        aspect_ratio: "1/1"
        tap_action:
          action: "more-info"
        hold_action:
          haptic: "heavy"
          action: "toggle"
        name: ""
        icon: "[[icon]]"
        styles:
          card:
            - background: "var(--contrast0)"
            - "--mdc-ripple-press-opacity": 0
            - border-radius: "15px"
            - color: "var(--contrast15)"
            - box-shadow: "none"
            - margin-top: "5px"
            - margin-bottom: "5px"
          img_cell:
            - justify-self: "center"
            - width: "30px"
            - margin: 10px 0px 0px 0px
          icon:
            - width: "30px"
            - height: "30px"
            - color: "var(--contrast15)"
          name:
            - justify-self: "center"
            - font-size: "12px"
            - margin: 0px 0px 10px 0px
            - color: "var(--black)"
            - font-family: "Google Sans"
        state:
          - value: "on"
            icon: "[[icon]]"
            styles:
              card:
                - background: |
                    [[[
                        var color = entity.attributes?.rgb_color;
                        if (entity.state != "on"){
                          return 'var(--contrast20)';
                        }
                        else if (color){
                          return 'rgba(' + color + ')'
                        }
                        else{
                          return 'var(--yellow)'
                        }
                    ]]]
                - box-shadow: |
                    [[[
                        var color = entity.attributes?.rgb_color;
                        if (entity.state != "on"){
                          return '0px 0px 6px 2px var(--contrast20)';
                        }
                        else if (color){
                          return '0px 0px 6px 2px rgba(' + color + ')'
                        }
                        else{
                          return '0px 0px 6px 2px var(--yellow)'
                        }
                    ]]]
                - border-radius: "100px"
              icon:
                - color: "var(--black)"
        card_mod:
          style: |
            ha-card {
              transition: 300ms !important;
              }
      - type: "custom:button-card"
        name: "[[name]]"
        show_label: false
        styles:
          card:
            - background: "none"
            - padding: 0px 0px
            - margin-top: "-1px"
            - "--mdc-ripple-press-opacity": 0
          name:
            - font-family: "Google Sans"
            - justify-self: "center"
            - font-size: "13px"
            - color: "var(--contrast20)"
          label:
            - font-family: "Google Sans"
            - font-weight: 300
            - justify-self: "start"
            - font-size: "16px"
            - color: "var(--contrast10)"
        card_mod:
          style: |
            ha-card {
              margin-top: 15px;
              }
