---
person_chip_away:
  card:
    type: "conditional"
    conditions:
      - condition: "state"
        entity: "[[person]]"
        state_not: "home"
    chip:
      type: "entity"
      entity: "[[person]]"
      content_info: "name"
      tap_action:
        action: "more-info"
      hold_action:
        action: "none"
      double_tap_action:
        action: "none"
      name: "Abwesend"
      use_entity_picture: true
      card_mod:
        style: |
          ha-card {
            --chip-background: var(--contrast15);
            }
