---
person_chip_home:
  card:
    type: "conditional"
    conditions:
      - condition: "state"
        entity: "[[person]]"
        state: "home"
    chip:
      type: "entity"
      entity: "[[person]]"
      content_info: "none"
      tap_action:
        action: "more-info"
      hold_action:
        action: "none"
      double_tap_action:
        action: "none"
      use_entity_picture: true
