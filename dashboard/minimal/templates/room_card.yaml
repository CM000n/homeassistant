---
room_card:
  card:
    type: "custom:button-card"
    name: "[[name]]"
    entity: "[[entity]]"
    icon: "[[icon]]"
    tap_action:
      action: "navigate"
      navigation_path: "[[navigation_path]]"
      haptic: "light"
    styles:
      grid:
        - grid-template-areas: '"i temp" "n hum"'
        - grid-template-columns: 1fr 1fr
        - grid-template-rows: 1fr min-content min-content
      card:
        - background: var(--contrast0)
        - padding: 10px
        - "--mdc-ripple-press-opacity": 0
        - box-shadow: none
        - border-radius: 18px
        - height: 96px
      img_cell:
        - justify-self: start
        - width: 24px
        - margin: 10px
      icon:
        - width: 24px
        - height: 24px
        - color: var(--contrast15)
      name:
        - justify-self: start
        - font-size: 14px
        - margin: 10px
        - color: var(--contrast15)
        - font-family: Product Sans
      custom_fields:
        temp:
          - align-self: start
          - justify-self: end
          - font-size: 14px
          - font-weight: 500
          - margin: 2px 0px 10px 0px
          - color: |
              [[[
                var state = states['[[entity]]'].state
               if(state == "off")
                return `var(--contrast10)`;
              else
                return `var(--contrast00)`;
              ]]]
          - font-family: Product Sans
          - background-color: |
              [[[
                var state = states['[[entity]]'].state
               if(state == "off")
                return `var(--contrast00)`;
              else
                return `var(--contrast15)`;
              ]]]
          - border-radius: 100px
          - padding: 6px
    custom_fields:
      temp: |
        [[[
         var state = states['[[entity]]'].state;
         if(state == "off")
          return `<ha-icon
          icon="mdi:lightbulb-off-outline"
          style="width: 25px; height: 25px; color: auto;">
          </ha-icon>`;
         else
          return `<ha-icon
          icon="mdi:lightbulb-on"
          style="width: 25px; height: 25px; color: auto;">
          </ha-icon>
          `;
        ]]]
    card_mod:
      style: |
        ha-card:active {
          box-shadow: none;
          transform: scale(0.96);
          transition: 200ms !important;
          transform-origin: center;
          }
