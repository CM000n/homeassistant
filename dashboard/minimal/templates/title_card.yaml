---
title_card:
  card:
    type: "custom:button-card"
    name: "[[name]]"
    label: "[[label]]"
    show_label: true
    styles:
      card:
        - background: none
        - padding: 0px 12px
        - margin-bottom: 0px
        - "--mdc-ripple-press-opacity": 0
      name:
        - font-family: Product Sans
        - justify-self: start
        - font-size: 20px
        - color: var(--contrast20)
      label:
        - font-family: Product Sans
        - font-weight: light
        - justify-self: start
        - font-size: 16px
        - color: var(--contrast10)
