              - type: custom:button-card
                icon: mdi:paw
                name: Animali
                tap_action:
                  action: navigate
                  navigation_path: /lovelace/animali
                  haptic: light
                styles:
                  grid:
                    - grid-template-areas: '"i temp" "n hum"'
                    - grid-template-columns: 1fr 1fr
                    - grid-template-rows: 1fr min-content min-content
                  card:
                    - background: var(--contrast15)
