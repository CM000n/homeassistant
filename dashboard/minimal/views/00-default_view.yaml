                  - font-weight: 500
                  - margin: 2px 0px 10px 0px
                  - color: |
                      [[[
                        var state = states['media_player.kuche'].state
                       if(state == "off")
                        return `var(--contrast10)`;
                      else
                        return `var(--contrast00)`;
                      ]]]
