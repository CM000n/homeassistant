                    - '--mdc-ripple-press-opacity': 0
                    - box-shadow: none
                    - height: 126px
                    - border-radius: 18px
                  img_cell:
                    - justify-self: start
                    - width: 24px
                    - margin: 10px
                    - padding-top: 40%
                  icon:
                    - width: 24px
                    - height: 24px
                    - color: var(--contrast0)
                  name:
                    - justify-self: start
                    - font-size: 13px
                    - margin: 10px
                    - color: var(--contrast0)
                    - font-family: Product Sans
                  custom_fields:
                    temp:
                      - align-self: start
                      - justify-self: end
                      - font-size: 14px
                      - font-weight: 500
                      - margin: 2px 0px 10px 0px
                      - color: |
                          [[[
                            var state = states['switch.sonoff_10009c7508_1'].state
                           if(state == "unavailable")
                            return `var(--contrast00)`;
                          if(state == "off")
                            return `var(--contrast00)`;
                          else
                            return `var(--contrast15)`;
                          ]]]
                      - font-family: Product Sans
                      - background-color: |
                          [[[
                            var state = states['switch.sonoff_10009c7508_1'].state
                           if(state == "unavailable")
                            return `var(--contrast12)`;
                           if(state == "off")
                            return `var(--contrast12)`;
                          else
                            return `var(--contrast00)`;
                          ]]]
                      - box-shadow: |
                          [[[
                            var state = states['switch.sonoff_10009c7508_1'].state
                           if(state == "unavailable")
                            return `none`;
                           if(state == "off")
                            return `none`;
                          else
                            return `0px 0px 8px 1px var(--contrast00)`;
                          ]]]
                      - border-radius: |
                          [[[
                            var state = states['switch.sonoff_10009c7508_1'].state
                           if(state == "unavailable")
                            return `15px`;
                           if(state == "off")
                            return `15px`;
                          else
                            return `100px`;
                          ]]]
                      - padding: 16px
                custom_fields:
                  temp: |
                    [[[
                     var state = states['switch.sonoff_10009c7508_1'].state;
                     if(state == "unavailable")
                      return `<ha-icon
                      icon="mdi:lightbulb-alert-outline"
                      style="width: 20px; height: 20px; color: auto;">
                      </ha-icon>`;
                     if(state == "off")
                      return `<ha-icon
                      icon="mdi:lightbulb-off-outline"
                      style="width: 20px; height: 20px; color: auto;">
                      </ha-icon>`;
                     else
                      return `<ha-icon
                      icon="mdi:lightbulb-on"
                      style="width: 20px; height: 20px; color: auto;">
                      </ha-icon>
                      `;
                    ]]]
                card_mod:
                  style: |
                    ha-card:active {
                      box-shadow: none;
                      transform: scale(0.96);
                      transition: 200ms !important;
                      transform-origin: center;
