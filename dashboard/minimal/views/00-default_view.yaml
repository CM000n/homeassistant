theme: "Minimal"
type: "masonry"
badges: []
cards:
  - type: "custom:layout-card"
    layout_type: "custom:grid-layout"
    layout:
      grid-template-columns: "auto 40%"
      grid-template-rows: 1
      max_cols: 2
      margin: "-4px"
    cards:
      - type: "custom:decluttering-card"
        template: "title_home_card"
      - type: "custom:decluttering-card"
        template: "title_chip_entity"
        variables:
          - entity: "sensor.stromzahler_stromverbrauch_taglich"
          - icon: "mdi:lightning-bolt"

  - type: "vertical-stack"
    cards:
      - type: "custom:mushroom-chips-card"
        alignment: "start"
        card_mod:
          style: |
            ha-card {
              margin-bottom: -15px;
              --primary-text-color: var(--contrast0);
              }
        chips:
          - type: "conditional"
            conditions:
              - condition: "state"
                entity: "person.simon"
                state: "home"
            chip:
              type: "entity"
              entity: "person.simon"
              content_info: "none"
              tap_action:
                action: "more-info"
              hold_action:
                action: "none"
              double_tap_action:
                action: "none"
              use_entity_picture: true
          - type: "conditional"
            conditions:
              - condition: "state"
                entity: "person.lisa"
                state: "home"
            chip:
              type: "entity"
              entity: "person.lisa"
              content_info: "none"
              tap_action:
                action: "more-info"
              hold_action:
                action: "none"
              double_tap_action:
                action: "none"
              use_entity_picture: true
          - type: "conditional"
            conditions:
              - condition: "state"
                entity: "person.simon"
                state_not: "home"
            chip:
              type: "entity"
              entity: "person.simon"
              content_info: "name"
              tap_action:
                action: "more-info"
              hold_action:
                action: "none"
              double_tap_action:
                action: "none"
              name: "Abwesend"
              use_entity_picture: true
              card_mod:
                style: |
                  ha-card {
                    --chip-background: var(--contrast15);
                    }
          - type: "conditional"
            conditions:
              - condition: "state"
                entity: "person.lisa"
                state_not: "home"
            chip:
              type: "entity"
              entity: "person.lisa"
              content_info: "name"
              tap_action:
                action: "more-info"
              hold_action:
                action: "none"
              double_tap_action:
                action: "none"
              name: "Abwesend"
              use_entity_picture: true
              card_mod:
                style: |
                  ha-card {
                    --chip-background: var(--contrast15);
                    }

      - type: "custom:stack-in-card"
        mode: "horizontal"
        keep:
          margin: true
          border_radius: true
          background: true
          outer_padding: false
        card_mod:
          style: |
            ha-card {
              border-radius: 18px;
              background-color: var(--contrast0);
              }
        cards:
          - type: "vertical-stack"
            cards:
              - type: "custom:decluttering-card"
                template: "energy_info_card"
                variables:
                  - entity: "sensor.apsystems_garagenpower_total_power_fixed"
                  - label: "Photovoltaik"
              - type: "custom:decluttering-card"
                template: "energy_bar_card_red_green"
                variables:
                  - entity: "sensor.apsystems_garagenpower_total_power_fixed"
          - type: "vertical-stack"
            cards:
              - type: "custom:decluttering-card"
                template: "energy_info_card"
                variables:
                  - entity: "sensor.esp_01s_stromzaehler_active_power"
                  - label: "Zählerkasten"
              - type: "custom:decluttering-card"
                template: "energy_bar_card_green_red"
                variables:
                  - entity: "sensor.esp_01s_stromzaehler_active_power"

      - type: "horizontal-stack"
        cards:
          - type: "custom:button-card"
            name: " "
            icon: "mdi:lightbulb-on"
            entity: "light.gruppe_alle"
            tap_action:
              action: "none"
            styles:
              grid:
                - grid-template-areas: '"i" "n" "slider"'
                - grid-template-columns: "1fr"
                - grid-template-rows: '"1fr" "min-content" "min-content"'
              card:
                - background: "var(--contrast15)"
                - "--mdc-ripple-press-opacity": 0
                - box-shadow: 0px 0px 4px 2px var(--contrast15)
                - border-radius: 100px
                - height: 50px
                - width: 50px
                - margin-top: 5px
                - margin-bottom: 5px
              img_cell:
                - justify-self: center
                - width: 20px
                - margin: 10px 0px 0px 0px
              icon:
                - width: 20px
                - height: 20px
                - color: var(--contrast0)
              name:
                - justify-self: center
                - font-size: 12px
                - margin: 0px 0px 10px 0px
                - color: var(--black)
                - font-family: Product Sans
            state:
              - value: "off"
                icon: mdi:lightbulb-off
                name: " "
                styles:
                  card:
                    - background: var(--contrast0)
                    - box-shadow: none
                  icon:
                    - color: var(--contrast8)
            card_mod:
              style: |
                ha-card {
                  transition: 300ms !important;
