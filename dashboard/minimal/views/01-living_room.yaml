      - type: vertical-stack
        cards:
          - type: grid
            square: false
            columns: 4
            cards:
              - type: vertical-stack
                cards:
                  - type: custom:button-card
                    entity: light.wohnzimmer_deckenleuchte
                    aspect_ratio: 1/1
                    tap_action:
                      action: more-info
                    hold_action:
                      haptic: heavy
                      action: toggle
                    name: " "
                    icon: mdi:globe-light
                    styles:
                      card:
                        - background: var(--contrast0)
                        - "--mdc-ripple-press-opacity": 0
                        - border-radius: 15px
                        - color: var(--contrast15)
                        - box-shadow: none
                        - margin-top: 5px
                        - margin-bottom: 5px
                      img_cell:
                        - justify-self: center
                        - width: 30px
                        - margin: 10px 0px 0px 0px
                      icon:
                        - width: 30px
                        - height: 30px
                        - color: var(--contrast15)
                      name:
                        - justify-self: center
                        - font-size: 12px
                        - margin: 0px 0px 10px 0px
                        - color: var(--black)
                        - font-family: Google Sans
                    state:
                      - value: "on"
                        icon: mdi:globe-light
                        styles:
                          card:
                            - background: |
                                [[[
                                    var color = entity.attributes?.rgb_color;
                                    if (entity.state != "on"){
                                      return 'var(--contrast20)';
                                    }
                                    else if (color){
                                      return 'rgba(' + color + ')'
                                    }
                                    else{
                                      return 'var(--yellow)'
                                    }
                                ]]]
                            - box-shadow: |
                                [[[
                                    var color = entity.attributes?.rgb_color;
                                    if (entity.state != "on"){
                                      return '0px 0px 6px 2px var(--contrast20)';
                                    }
                                    else if (color){
                                      return '0px 0px 6px 2px rgba(' + color + ')'
                                    }
                                    else{
                                      return '0px 0px 6px 2px var(--yellow)'
                                    }
                                ]]]
                            - border-radius: 100px
                          icon:
                            - color: var(--black)
                    card_mod:
                      style: |
                        ha-card {
                          transition: 300ms !important;
                          }

                  - type: custom:button-card
                    name: Deckenlampe
                    show_label: false
                    styles:
                      card:
