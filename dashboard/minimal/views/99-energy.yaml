            - justify-self: start
            - font-size: 20px
            - color: var(--contrast20)
          label:
            - font-family: Product Sans Light
            - justify-self: start
            - font-size: 16px
            - color: var(--contrast10)
      - type: custom:mushroom-chips-card
        chips:
          - type: template
            tap_action:
              action: navigate
              navigation_path: /energy
            hold_action:
              action: none
            double_tap_action:
              action: none
            icon: mdi:lightning-bolt
            icon_color: ""
        alignment: end
        card_mod:
          style: |
            ha-card {
              margin-top: 5px;
              }
