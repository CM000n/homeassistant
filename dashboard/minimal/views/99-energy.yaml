---
title: ""
path: "energy_view"
icon: "mdi:flash"
visible:
  - user: "3fb4deff931c4631b84d2584e5f2e493"
  - user: "e7bec22aa70e4762ac231811f5997452"
  - user: "393f7a35e14f417b8a42b130272cc586"
theme: "Minimal"
type: "masonry"
back_path: "/lovelace-minimal/default_view"
badges: []
cards:
  - type: "custom:layout-card"
    layout_type: "custom:grid-layout"
    layout:
      grid-template-columns: auto 15%
      grid-template-rows: 1
      max_cols: 2
      margin: "0px"
    cards:
      - type: "custom:decluttering-card"
        template: "title_card"
        variables:
          - name: "Energie"
          - label: "Verbrauch & Produktion"
      - type: "custom:decluttering-card"
        template: "title_chip_navigate"
        variables:
          - navigation_path: "/energy"
          - icon: "mdi:lightning-bolt"

  - type: "vertical-stack"
    cards:
      - type: "custom:mushroom-chips-card"
        alignment: "start"
        card_mod:
          style: |
            ha-card {
              --chip-background: var(--contrast0);
              --primary-text-color: var(--contrast18);
              margin-top: -5px;
              font-family: Product Sans;
              }
        chips:
          - type: "entity"
            entity: "sensor.power_highest_peak_time_today"
            double_tap_action:
              action: "none"
            icon: "mdi:solar-power-variant"
            content_info: "state"
            tap_action:
              action: "more-info"
            hold_action:
              action: "none"
          - type: "entity"
            entity: "sensor.power_highest_peak_time_tomorrow"
            double_tap_action:
              action: none
            icon: mdi:solar-power-variant
            content_info: "state"
            tap_action:
              action: "more-info"
            hold_action:
              action: "none"

      - type: "grid"
        columns: 2
        square: false
        cards:
          - type: "custom:decluttering-card"
            template: "sensor_line_graph_card"
            variables:
              - entity: "sensor.balkonkraftwerk_stromproduktion_taglich_latest"
              - name: "Tagesproduktion"
          - type: "custom:decluttering-card"
            template: "sensor_line_graph_card"
            variables:
              - entity: "sensor.stromzahler_stromverbrauch_taglich"
              - name: "Tagesverbrauch"
          - type: "custom:decluttering-card"
            template: "sensor_line_graph_card"
            variables:
              - entity: "sensor.apsystems_garagenpower_total_power_fixed"
              - name: "Leistung Photovoltaik"
          - type: "custom:decluttering-card"
            template: "sensor_line_graph_card"
            variables:
              - entity: "sensor.esp_01s_stromzaehler_active_power"
              - name: "Leistung Zähler"

  - type: vertical-stack
    cards:
      - type: "custom:decluttering-card"
        template: "title_card"
        variables:
          - name: "Photovoltaik"
          - label: "Produktion"
      - type: grid
        square: false
        cards:
          - type: custom:button-card
            card_mod:
              style: |
                ha-card {
                  transition: 300ms !important;
                  }
            icon: mdi:molecule-co2
            name: Einsparung
            show_state: true
            entity: sensor.co2_einsparung_solar_jahrlich_neu
            tap_action:
              action: more-info
            state_display: |
              [[[
                return Math.round(Number(entity.state)).toFixed(0) +' kgCO2eq';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"i" "n" "slider"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr min-content min-content
              card:
                - background: var(--contrast15)
                - padding: 16px
                - "--mdc-ripple-press-opacity": 0
              img_cell:
                - justify-self: start
                - width: 24px
              icon:
                - width: 24px
                - height: 24px
                - color: var(--contrast0)
              name:
                - justify-self: start
                - font-size: 12px
                - margin: 4px 0 12px 0
                - color: var(--contrast0)
                - font-family: Product Sans
              state:
                - color: var(--contrast0)
                - font-family: Product Sans Black
          - type: custom:button-card
            card_mod:
              style: |
                ha-card {
                  transition: 300ms !important;
                  }
            icon: mdi:solar-power-variant
            name: Stromproduktion jährlich
            show_state: true
            entity: sensor.balkonkraftwerk_stromproduktion_jahrlich_latest
            tap_action:
              action: more-info
            state_display: |
              [[[
                return Math.round(Number(entity.state)).toFixed(0) +' kWh';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"i" "n" "slider"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr min-content min-content
              card:
                - background: var(--contrast0)
                - padding: 16px
                - "--mdc-ripple-press-opacity": 0
              img_cell:
                - justify-self: start
                - width: 24px
              icon:
                - width: 24px
                - height: 24px
                - color: var(--contrast15)
              name:
                - justify-self: start
                - font-size: 12px
                - margin: 4px 0 12px 0
                - color: var(--contrast15)
              state:
                - color: var(--contrast15)
                - font-family: Product Sans Black
        columns: 2

      - type: "custom:decluttering-card"
        template: "title_card"
        variables:
          - name: "Netz"
          - label: "Verbrauch"

      - type: grid
        square: false
        cards:
          - type: custom:button-card
            card_mod:
              style: |
                ha-card {
                  transition: 300ms !important;
                  }
            icon: mdi:molecule-co2
            name: Emission
            show_state: true
            entity: sensor.co2_emissionen_netz_jahrlich_neu
            tap_action:
              action: more-info
            state_display: |
              [[[
                return Math.round(Number(entity.state)).toFixed(0) +' kgCO2eq';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"i" "n" "slider"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr min-content min-content
              card:
                - background: var(--contrast15)
                - padding: 16px
                - "--mdc-ripple-press-opacity": 0
              img_cell:
                - justify-self: start
                - width: 24px
              icon:
                - width: 24px
                - height: 24px
                - color: var(--contrast0)
              name:
                - justify-self: start
                - font-size: 12px
                - margin: 4px 0 12px 0
                - color: var(--contrast0)
              state:
                - color: var(--contrast0)
                - font-family: Product Sans Black
          - type: custom:button-card
            card_mod:
              style: |
                ha-card {
                  transition: 300ms !important;
                  }
            icon: mdi:transmission-tower-export
            name: Stromverbrauch jährlich
            show_state: true
            entity: sensor.stromzahler_stromverbrauch_jahrlich
            tap_action:
              action: more-info
            state_display: |
              [[[
                return Math.round(Number(entity.state)).toFixed(0) +' kWh';
              ]]]
            styles:
              grid:
                - grid-template-areas: '"i" "n" "slider"'
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr min-content min-content
              card:
                - background: var(--contrast0)
                - padding: 16px
                - "--mdc-ripple-press-opacity": 0
              img_cell:
                - justify-self: start
                - width: 24px
              icon:
                - width: 24px
                - height: 24px
                - color: var(--contrast15)
              name:
                - justify-self: start
                - font-size: 12px
                - margin: 4px 0 12px 0
                - color: var(--contrast15)
              state:
                - color: var(--contrast15)
                - font-family: Product Sans Black
        columns: 2

      - type: "custom:decluttering-card"
        template: "title_card"
        variables:
          - name: "Echtzeit"
          - label: "Energiefluss"

      - type: custom:power-flow-card-plus
        entities:
          grid:
            icon: mdi:transmission-tower
            name: Netz
            entity: sensor.esp_01s_stromzaehler_active_power
          solar:
            icon: mdi:solar-power-variant
            name: Photovoltaik
            entity: sensor.apsystems_garagenpower_total_power_fixed
        w_decimals: 0
        kw_decimals: 2
        min_flow_rate: 0.9
        max_flow_rate: 6
        watt_threshold: 10000
        clickable_entities: true
        card_mod:
          style: |
            ha-card {
             background-color: transparent;
             box-shadow: none;
             }

  - type: custom:gap-card
    height: 80
