  - path: "environment"
    icon: "mdi:sprout"
    title: ""
    visible:
      - user: "3fb4deff931c4631b84d2584e5f2e493"
      - user: "e7bec22aa70e4762ac231811f5997452"
    theme: "Rounded"
    type: "masonry"
    subview: true
    back_path: "/lovelace-rounded/default_view"
    badges: []
    cards:
      - name: "Umwelt"
        <<: *title_card_template
      - type: 'custom:floorplan-card'
        config:
          image:
            location: /local/psychrometry-chart.svg
            cache: false
          stylesheet: /local/psychrometry-chart.css
          defaults:
            hover_action: hover-info
            tap_action: more-info
          rules:
            - entity: sensor.netatmo_strawberry_land_indoor_temperature
              state_action:
                action: call-service
                service: floorplan.style_set
                service_data:
                  element: indicator-bedroom
                  style: |
                    >
                    var x = (parseFloat(entity.state) + 20) / 65 * 1007 - 237;
                    var y = 665 - (parseFloat(states['sensor.thermal_comfort_netatmo_bedroom_absolutehumidity'].state) / 35 * 665) - 155; 
                    return `transform: translate(${x}px, ${y}px);`;
            - entity: sensor.awtrix_ulanzi_tc001_temperature
              state_action:
                action: call-service
                service: floorplan.style_set
                service_data:
                  element: indicator-workspace
                  style: |
                    >
                    var x = (parseFloat(entity.state) + 20) / 65 * 1007 - 256;
                    var y = 665 - (parseFloat(states['sensor.thermal_comfort_buro_absolute_humidity'].state) / 35 * 665) - 10; 
                    return `transform: translate(${x}px, ${y}px);`;
            - entity: sensor.weather_temperature
              state_action:
                action: call-service
                service: floorplan.style_set
                service_data:
                  element: indicator-outdoor
                  style: |
                    >
                    var x = (parseFloat(entity.state) + 20) / 65 * 1007 - 229;
                    var y = 665 - (parseFloat(states['sensor.thermal_comfort_aussen_absolute_humidity'].state) / 35 * 665) - 155; 
                    return `transform: translate(${x}px, ${y}px);`;