        - color: "var(--contrast20)"
  vacuum_zone_card_template: &vacuum_zone_card_template
    type: "custom:button-card"
    show_label: true
    tap_action:
      action: "toggle"
      haptic: "medium"
    state:
      - value: "on"
        styles:
          card:
            - background-color: "var(--yellow)"
            - box-shadow: "none"
          icon:
            - color: "var(--black)"
          name:
