---
default_templates:
  title_card_template: &title_card_template
    type: "custom:button-card"
    styles:
      card:
        - background: "none"
        - padding: "16px 0"
        - "--mdc-ripple-press-opacity": 0
        - height: "36px"
      name:
        - font-size: "32px"
        - color: "var(--contrast20)"
    tap_action:
      action: "navigate"
      navigation_path: "/lovelace-rounded/default_view"
      haptic: "medium"
  sensor_line_graph_card_template: &sensor_line_graph_card_template
    type: "sensor"
    hours_to_show: 24
    detail: 1
    graph: "line"
    icon: "none"
    card_mod:
      class: "graph"
  sensor_swipe_card_template: &sensor_swipe_card_template
    type: "custom:swipe-card"
    card_width: "calc(100% - 48px)"
    start_card: 3
    reset_after: 15
    parameters:
      centeredSlides: true
      slidesPerView: "auto"
      spaceBetween: 16
      initialSlide: 0
  navigation_button_template: &navigation_button_template
    type: "custom:button-card"
    show_label: true
    hold_action:
      action: "more-info"
      haptic: "medium"
    custom_fields:
      light:
        card:
          type: "custom:button-card"
          entity: "[[[ return entity.entity_id ]]]"
          show_name: false
          show_label: false
          state:
            - value: "on"
              icon: "mdi:lightbulb"
            - value: "off"
              icon: "mdi:lightbulb-off"
            - value: "unavailable"
              icon: "mdi:lightbulb-question"
              styles:
                icon:
                  - color: "var(--contrast6)"
            - value: "unknown"
              icon: "mdi:lightbulb-question"
              styles:
                icon:
                  - color: "var(--contrast6)"
          styles:
            icon:
              - width: "24px"
              - height: "24px"
    styles:
      grid:
        - grid-template-areas: "'i light' 'n n' 'l l'"
        - grid-template-columns: "1fr 1fr"
        - grid-template-rows: "35% min-content min-content"
      card:
        - background: "var(--contrast2)"
        - padding: "16px"
        - "--mdc-ripple-press-opacity": 0
        - height: "100px"
      img_cell:
        - justify-self: "start"
        - width: "24px"
      icon:
        - width: "24px"
        - height: "24px"
        - color: "var(--contrast8)"
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin: "4px 0 3px 0"
        - max-width: "100%"
        - color: "var(--contrast8)"
      name:
        - justify-self: "start"
        - font-size: "14px"
        - margin: "4px 0 12px 0"
        - color: "var(--contrast8)"
    state:
      - value: "on"
        styles:
          card:
            - background: "var(--yellow)"
          icon:
            - color: "var(--black)"
          label:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "off"
        styles:
          icon:
            - color: "var(--contrast20)"
          label:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
  navigation_button_template_cellar: &navigation_button_template_cellar
    type: "custom:button-card"
    show_label: true
    styles:
      grid:
        - grid-template-areas: "'i' 'n n' 'l l'"
        - grid-template-columns: "1fr 1fr"
        - grid-template-rows: "35% min-content min-content"
      card:
        - background: "var(--contrast2)"
        - padding: "16px"
        - "--mdc-ripple-press-opacity": 0
        - height: "100px"
      img_cell:
        - justify-self: "start"
        - width: "24px"
      icon:
        - width: "24px"
        - height: "24px"
        - color: "var(--contrast8)"
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin: "4px 0 3px 0"
        - max-width: "100%"
        - color: "var(--contrast8)"
      name:
        - justify-self: "start"
        - font-size: "14px"
        - margin: "4px 0 12px 0"
        - color: "var(--contrast8)"
    state:
      - value: "on"
        styles:
          card:
            - background: "var(--yellow)"
          icon:
            - color: "var(--black)"
          label:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "off"
        styles:
          icon:
            - color: "var(--contrast20)"
          label:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
  light_button_template: &light_button_template
    type: "custom:button-card"
    tap_action:
      action: "toggle"
      haptic: "medium"
    hold_action:
      action: "more-info"
      haptic: "medium"
    custom_fields:
      slider:
        card:
          type: "custom:my-slider-v2"
          entity: "[[[ return entity.entity_id ]]]"
          colorMode: "brightness"
          styles:
            container:
              - background: "none"
              - border-radius: "100px"
              - overflow: "visible"
            card:
              - height: "16px"
              - padding: "0 8px"
              - background: |
                  [[[
                    if (entity.state == "on") return "linear-gradient(90deg, rgba(255,255,255, 0.3) 0%, rgba(255,255,255, 1) 100%)";
                    else return "var(--contrast4)";
                  ]]]
            track:
              - overflow: "visible"
              - background: "none"
            progress:
              - background: "none"
            thumb:
              - background: |
                  [[[
                    if (entity.state == "on") return "var(--black)";
                    if (entity.state == "off") return "var(--contrast20)";
                    else return "var(--contrast8)";
                  ]]]
              - top: "2px"
              - right: "-6px"
              - height: "12px"
              - width: "12px"
              - border-radius: "100px"
    styles:
      grid:
        - grid-template-areas: "'i' 'n' 'slider'"
        - grid-template-columns: "1fr"
        - grid-template-rows: "1fr min-content min-content"
      card:
        - background: "var(--contrast2)"
        - padding: "16px"
        - "--mdc-ripple-press-opacity": 0
        - height: "100px"
      img_cell:
        - justify-self: "start"
        - width: "24px"
      icon:
        - width: "24px"
        - height: "24px"
        - color: "var(--contrast8)"
      name:
        - justify-self: "start"
        - font-size: "14px"
        - margin: "4px 0 12px 0"
        - color: "var(--contrast8)"
    state:
      - value: "on"
        styles:
          card:
            - background: |
                [[[
                    var color = entity.attributes?.rgb_color;
                    if (entity.state != "on"){
                      return 'var(--contrast20)';
                    }
                    else if (color){
                      return 'rgba(' + color + ')'
                    }
                    else{
                      return 'var(--yellow)'
                    }
                ]]]
          icon:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "off"
        styles:
          icon:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
  light_button_template_bath: &light_button_template_bath
    type: "custom:button-card"
    tap_action:
      action: "toggle"
      haptic: "medium"
    hold_action:
      action: "more-info"
      haptic: "medium"
    styles:
      grid:
        - grid-template-areas: "'i' 'n'"
        - grid-template-columns: "1fr"
        - grid-template-rows: "1fr min-content min-content"
      card:
        - background: "var(--contrast2)"
        - padding: "16px"
        - "--mdc-ripple-press-opacity": 0
        - height: "100px"
      img_cell:
        - justify-self: "start"
        - width: "24px"
      icon:
        - width: "24px"
        - height: "24px"
        - color: "var(--contrast8)"
      name:
        - justify-self: "start"
        - font-size: "14px"
        - margin: "4px 0 12px 0"
        - color: "var(--contrast8)"
    state:
      - value: "on"
        styles:
          card:
            - background: "var(--yellow)"
          icon:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "off"
        styles:
          icon:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
  person_button_template: &person_button_template
    type: "custom:button-card"
    show_label: true
    show_entity_picture: true
    styles:
      grid:
        - grid-template-areas: "'i' 'n n' 'l l'"
        - grid-template-columns: "1fr 1fr"
        - grid-template-rows: "50% max-content max-content"
      card:
        - background: "var(--contrast2)"
        - padding: "16px"
        - "--mdc-ripple-press-opacity": 0
        - height: "100px"
      img_cell:
        - justify-self: "start"
        - width: "35px"
      icon:
        - width: "30px"
        - height: "30px"
        - color: "var(--contrast8)"
        - clip-path: "circle()"
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin: "0 0 0 0"
        - max-width: "100%"
        - color: "var(--contrast8)"
      name:
        - justify-self: "start"
        - font-size: "14px"
        - margin: "0 0 0 0"
        - color: "var(--contrast8)"
    state:
      - value: "home"
        styles:
          card:
            - background: "var(--green)"
          icon:
            - color: "var(--black)"
          label:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "not_home"
        styles:
          icon:
            - color: "var(--contrast20)"
          label:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
  appliances_button_template: &appliances_button_template
    type: "custom:button-card"
    show_label: true
    styles:
      grid:
        - grid-template-areas: "'i' 'n n' 'l l'"
        - grid-template-columns: "1fr 1fr"
        - grid-template-rows: "35% min-content min-content"
      card:
        - background: "var(--contrast2)"
        - padding: "16px"
        - "--mdc-ripple-press-opacity": 0
        - height: "100px"
      img_cell:
        - justify-self: "start"
        - width: "24px"
      icon:
        - width: "24px"
        - height: "24px"
        - color: "var(--contrast8)"
      label:
        - justify-self: "start"
        - align-self: "start"
        - font-size: "12px"
        - filter: "opacity(40%)"
        - margin: "4px 0 3px 0"
        - max-width: "100%"
        - color: "var(--contrast8)"
      name:
        - justify-self: "start"
        - font-size: "14px"
        - margin: "4px 0 12px 0"
        - color: "var(--contrast8)"
    state:
      - value: "on"
        styles:
          card:
            - background: "var(--blue)"
          icon:
            - color: "var(--black)"
          label:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "off"
        styles:
          icon:
            - color: "var(--contrast20)"
          label:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
      - value: "cleaning"
        styles:
          card:
            - background: "var(--blue)"
          icon:
            - color: "var(--black)"
          label:
            - color: "var(--black)"
          name:
            - color: "var(--black)"
      - value: "docked"
        styles:
          icon:
            - color: "var(--contrast20)"
          label:
            - color: "var(--contrast20)"
          name:
            - color: "var(--contrast20)"
  brightness_slider_template: &brightness_slider_template
    type: "custom:button-card"
    show_icon: false
    show_label: false
    name: "Helligkeit"
    custom_fields:
      slider:
        card:
          type: "custom:my-slider-v2"
          entity: "[[[ return entity.entity_id ]]]"
          colorMode: "brightness"
          styles:
            container:
              - border-radius: "100px"
              - overflow: "visible"
              - background: "none"
            card:
              - height: "40px"
              - padding: "0 20px"
              - background: "var(--brightness)"
            track:
              - overflow: "visible"
              - background: "none"
            progress:
              - background: "none"
            thumb:
              - background: "var(--black)"
              - top: "2px"
              - right: "-18px"
              - height: "36px"
              - width: "36px"
              - border-radius: "100px"
    styles:
      grid:
        - grid-template-areas: "'n' 'slider'"
        - grid-template-columns: "1fr"
        - grid-template-rows: "1fr min-content min-content"
      card:
        - background: "var(--brightness-tint)"
