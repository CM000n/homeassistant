title: ""
views:
  - path: "default_view"
    icon: "mdi:home"
    title: ""
    visible:
      - user: "3fb4deff931c4631b84d2584e5f2e493"
      - user: "e7bec22aa70e4762ac231811f5997452"
    theme: "Rounded"
    type: "masonry"
    badges: []
    cards:
      - name: "Home"
        <<: *title_card_template
      - <<: *sensor_swipe_card_template
        cards:
          - name: "Leistung"
            entity: "sensor.esp_01s_stromzaehler_active_power"
            <<: *sensor_line_graph_card_template
          - name: "Verbrauch"
            entity: "sensor.stromzahler_stromverbrauch_jahrlich"
            <<: *sensor_line_graph_card_template
          - name: "Außen"
            entity: "sensor.eingangstur_bewegungsmelder_temperature"
            <<: *sensor_line_graph_card_template
      - type: "grid"
        columns: 2
        square: false
        cards:
          - name: "Simon"
            entity: "person.simon"
            label: "[[[ return states['sensor.simon'].state ]]]"
            tap_action:
              action: "more-info"
              haptic: "medium"
            <<: *person_button_template
          - name: "Lisa"
            entity: "person.lisa"
            label: "[[[ return states['sensor.lisa'].state ]]]"
            tap_action:
              action: "more-info"
              haptic: "medium"
            <<: *person_button_template
      - type: "grid"
        columns: 2
        square: false
        cards:
          - name: "Wohnzimmer"
            entity: "light.gruppe_wohnzimmer"
            icon: "mdi:sofa"
            label: "[[[ return states['sensor.steckdose_wohnzimmer_temperatur'].state + ' °C' ]]]"
            tap_action:
              action: "navigate"
              navigation_path: "/lovelace-rounded/living_room"
              haptic: "medium"
            <<: *navigation_button_template
          - name: "Küche"
            entity: "light.gruppe_kuche"
            icon: "mdi:silverware-fork-knife"
            label: "[[[ return states['sensor.steckdose_wohnzimmer_temperatur'].state + ' °C' ]]]"
            tap_action:
              action: "navigate"
              navigation_path: "/lovelace-rounded/kitchen"
              haptic: "medium"
            <<: *navigation_button_template
          - name: "Schlafzimmer"
            entity: "light.gruppe_schlafzimmer"
            icon: "mdi:bed"
            label: "[[[ return states['sensor.steckdose_schlafzimmer_temperatur'].state + ' °C' ]]]"
            tap_action:
              action: "navigate"
              navigation_path: "/lovelace-rounded/sleep"
              haptic: "medium"
            <<: *navigation_button_template
          - name: "Kinderzimmer"
            entity: "light.gruppe_kinderzimmer"
            icon: "mdi:teddy-bear"
            label: "[[[ return states['sensor.steckdose_ankleide_temperatur'].state + ' °C' ]]]"
            tap_action:
              action: "navigate"
              navigation_path: "/lovelace-rounded/child_room"
              haptic: "medium"
            <<: *navigation_button_template
          - name: "Badezimmer"
            entity: "light.gruppe_bad"
            icon: "mdi:faucet"
            label: "[[[ return states['sensor.deckenlampe_bad_temperatur_offset_gefiltert'].state + ' °C' ]]]"
            tap_action:
              action: "navigate"
              navigation_path: "/lovelace-rounded/bath"
              haptic: "medium"
            <<: *navigation_button_template
          - name: "Büro"
            entity: "light.gruppe_buro"
            icon: "mdi:chair-rolling"
            label: "[[[ return states['sensor.awtrix_ulanzi_tc001_temperature'].state + ' °C' ]]]"
            tap_action:
              action: "navigate"
              navigation_path: "/lovelace-rounded/office"
              haptic: "medium"
            <<: *navigation_button_template
          - name: "Keller"
            entity: "group.cellar_appliances"
            icon: "mdi:washing-machine"
