sensor_swipe_card:
  type: "custom:swipe-card"
  card_width: "calc(100% - 48px)"
  start_card: 3
  reset_after: 15
  parameters:
    centeredSlides: true
    slidesPerView: "auto"
    spaceBetween: 16
    initialSlide: 0
  cards:
    - name: "[[name_1]]"
      entity: "[[entity_1]]"
      type: "sensor"
      hours_to_show: 24
      detail: 1
      graph: "line"
      icon: "none"
      card_mod:
        class: "graph"
    - name: "[[name_2]]"
      entity: "[[entity_2]]"
      type: "sensor"
      hours_to_show: 24
      detail: 1
      graph: "line"
      icon: "none"
      card_mod:
        class: "graph"
    - name: "[[name_3]]"
      entity: "[[entity_3]]"
      type: "sensor"
      hours_to_show: 24
      detail: 1
      graph: "line"
      icon: "none"
      card_mod:
        class: "graph"
