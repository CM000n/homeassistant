sensor_swipe_card:
  card:
    card_width: "calc(100% - 48px)"
    type: "custom:swipe-card"
    start_card: 3
    reset_after: 15
    parameters:
      centeredSlides: true
      slidesPerView: "auto"
      spaceBetween: 16
      initialSlide: 0
    cards:
      - type: "sensor"
        name: "[[name_1]]"
        entity: "[[entity_1]]"
        hours_to_show: 24
        detail: 1
        graph: "line"
        icon: "none"
        card_mod:
          class: "graph"
      - type: "sensor"
        name: "[[name_2]]"
        entity: "[[entity_2]]"
        hours_to_show: 24
        detail: 1
        graph: "line"
        icon: "none"
        card_mod:
          class: "graph"
      - type: "sensor"
        name: "[[name_3]]"
        entity: "[[entity_3]]"
        hours_to_show: 24
        detail: 1
        graph: "line"
        icon: "none"
        card_mod:
          class: "graph"
