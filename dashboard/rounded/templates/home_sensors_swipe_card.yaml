home_sensors_swipe_card:
  card:
    type: "custom:swipe-card"
    card_width: "calc(100% - 48px)"
    start_card: 3
    reset_after: 15
    parameters:
      centeredSlides: true
      slidesPerView: "auto"
      spaceBetween: 16
      initialSlide: 0
    cards:
      - type: "sensor"
        name: "[[name_1]]"
        entity: "[[entity_1]]"
        hours_to_show: 24
        detail: 1
        graph: "line"
        icon: "none"
        card_mod:
          class: "graph"
      - type: "sensor"
        name: "[[name_2]]"
        entity: "[[entity_2]]"
        hours_to_show: 24
        detail: 1
        graph: "line"
        icon: "none"
        card_mod:
          class: "graph"
      - type: "custom:apexcharts-card"
        cache: false
        layout: "minimal"
        graph_span: "24h"
        header:
          show: false
        apex_config:
          tooltip:
            style:
              fontSize: "14px"
            x:
              show: true
              formatter: |
                EVAL:(timestamp) => {
                  let date = new Date(timestamp).toLocaleString('de-DE',{weekday: 'long', hour: '2-digit', minute:'2-digit'}).toString();
                  return date.charAt(0).toUpperCase() + date.slice(1);
                }
          chart:
            height: "150px"
          legend:
            show: true
            showForSingleSeries: true
            fontSize: "15px"
            fontWeight: 600
            position: "top"
            horizontalAlign: "left"
            floating: true
            markers:
              width: 26
              height: 23
              customHTML:
                - |-
                  EVAL:() => {
                    return `<ha-icon icon="mdi:thermometer" style="--mdc-icon-size: 23px;"></ha-icon>`
                  }
              fillColors:
                - "none"
          fill:
            type: "gradient"
            gradient:
              type: "vertical"
              shadeIntensity: 0.2
              opacityFrom: 0.7
              opacityTo: 0.1
              stops:
                - 0
                - 90
                - 100
          stroke:
            curve: "smooth"
            width: 3
        all_series_config:
          type: "area"
          fill_raw: "last"
          extend_to: false
          group_by:
            func: "avg"
            duration: "1h"
        series:
          - entity: "[[entity_3]]"
            name: "[[name_3]]"
            color: "var(--blue)"
