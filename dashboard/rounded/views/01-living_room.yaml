path: "living_room"
icon: "mdi:sofa"
title: ""
visible:
  - user: "3fb4deff931c4631b84d2584e5f2e493"
  - user: "e7bec22aa70e4762ac231811f5997452"
theme: "Rounded"
type: "masonry"
subview: true
back_path: "/lovelace-rounded/default_view"
badges: []
cards:
  - type: "custom:decluttering-card"
    template: "title_card"
    variables:
      - name: "Wohnzimmer"
  - type: "custom:decluttering-card"
    template: "apex_sensor_card"
    variables:
      - name: "Temperatur"
      - entity: "sensor.steckdose_wohnzimmer_temperatur"
  - type: "grid"
    columns: 1
    square: false
    cards:
      - type: "grid"
        columns: 2
        square: false
        cards:
          - type: "custom:decluttering-card"
            template: "light_button_card"
            variables:
              - name: "Deckenlampe"
              - entity: "light.wohnzimmer_deckenleuchte"
              - icon: "mdi:globe-light"
          - type: "custom:decluttering-card"
            template: "light_button_card"
            variables:
              - name: "Lightstrip"
              - entity: "light.wohnzimmer_lightstrip"
              - icon: "mdi:led-strip-variant"
          - type: "custom:decluttering-card"
            template: "light_button_card"
            variables:
              - name: "Stehlampe"
              - entity: "light.wohnzimmer_stehlampe_rechts"
              - icon: "mdi:floor-lamp"
          - type: "custom:decluttering-card"
            template: "light_button_card"
            variables:
              - name: "Weihnachtsstern"
              - entity: "light.wohnzimmer_weihnachtsstern"
              - icon: "mdi:star"
      - type: "grid"
        columns: 1
        square: false
        cards:
          - type: "custom:decluttering-card"
            template: "light_brightness_slider"
            variables:
              - entity: "light.active_light_group_living_room"
          - type: "custom:decluttering-card"
            template: "light_temperature_slider"
            variables:
              - entity: "light.active_light_group_living_room"
  - type: "grid"
    columns: 2
    square: false
    cards:
      - type: "custom:decluttering-card"
        template: "appliances_button_card"
        variables:
          - name: "Ventilator"
          - entity: "fan.wohnzimmer"
          - icon: "mdi:fan"
          - label: "[[[ return states['fan.wohnzimmer'].state ]]]"
  - type: "grid"
    columns: 1
    square: false
    cards:
      - name: "Sonos"
        entity: "media_player.wohnzimmer"
        type: "custom:mini-media-player"
        icon: "mdi:speaker"
        artwork: "material"
        toggle_power: false
        idle_view:
          when_idle: true
          when_paused: true
        speaker_group:
          platform: "sonos"
          show_group_count: true
          entities:
            - entity_id: "media_player.wohnzimmer"
              name: "Sonos Wohnzimmer"
            - entity_id: "media_player.kuche"
              name: "Sonos Küche"
            - entity_id: "media_player.bad"
              name: "Sonos Bad"
            - entity_id: "media_player.buro"
              name: "Sonos Büro"
            - entity_id: "media_player.schlafzimmer"
              name: "Sonos Schlafzimmer"
      - name: "Chromecast"
        entity: "media_player.chromecast"
        type: "custom:mini-media-player"
        icon: "mdi:cast"
        artwork: "material"
        toggle_power: false
        idle_view:
          when_idle: true
          when_paused: true
      - name: "Homemini"
        entity: "media_player.homemini_wohnzimmer"
        type: "custom:mini-media-player"
        icon: "mdi:google"
        artwork: "material"
        toggle_power: false
        idle_view:
          when_idle: true
          when_paused: true
  - type: "custom:button-card"
    color_type: "blank-card"
