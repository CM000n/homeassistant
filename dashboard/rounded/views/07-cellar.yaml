path: "cellar"
icon: "mdi:washing-machine"
title: ""
visible:
  - user: "3fb4deff931c4631b84d2584e5f2e493"
  - user: "e7bec22aa70e4762ac231811f5997452"
theme: "Rounded"
type: "masonry"
subview: true
back_path: "/lovelace-rounded/default_view"
badges: []
cards:
  - type: "custom:decluttering-card"
    template: "title_card"
    variables:
      - name: "Keller"
  - type: "custom:decluttering-card"
    template: "apex_sensor_card"
    variables:
      - name: "Temperatur"
      - entity: "sensor.steckdose_waschmaschine_temperatur"
  - type: "grid"
    columns: 2
    square: false
    cards:
      - type: "custom:decluttering-card"
        template: "appliances_button_card"
        variables:
          - name: "Waschmaschine"
          - entity: "binary_sensor.waschmaschine"
          - icon: "mdi:washing-machine"
          - label: "[[[ return states['binary_sensor.waschmaschine'].state ]]]"
      - type: "custom:decluttering-card"
        template: "appliances_button_card"
        variables:
          - name: "Trockner"
          - entity: "binary_sensor.trockner"
          - icon: "mdi:tumble-dryer"
          - label: "[[[ return states['binary_sensor.trockner'].state ]]]"
  - type: "grid"
    columns: 2
    square: false
    cards:
      - type: "custom:decluttering-card"
        template: "hvac_card"
        variables:
          - name: "HK1 Fußboden"
          - entity: "climate.vicare_heating_1"
          - icon: "mdi:heat-wave"
      - type: "custom:decluttering-card"
        template: "hvac_card"
        variables:
          - name: "HK2 Radiatoren"
          - entity: "climate.vicare_heating_2"
          - icon: "mdi:heat-wave"
      - type: "custom:decluttering-card"
        template: "hvac_card"
        variables:
          - name: "Warmwasser"
          - entity: "water_heater.vicare_water_1"
          - icon: "mdi:hot-tub"
  - type: "custom:button-card"
    color_type: "blank-card"