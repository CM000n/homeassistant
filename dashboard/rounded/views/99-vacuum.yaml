---
path: "vacuum"
icon: "mdi:robot-vacuum"
title: ""
visible:
  - user: "8bdb01bc453944059ad983886193d3d2"
  - user: "e7bec22aa70e4762ac231811f5997452"
theme: "Rounded"
type: "masonry"
subview: true
back_path: "/lovelace-rounded/default_view"
badges: []
cards:
  - type: "custom:decluttering-card"
    template: "title_info_card"
    variables:
      - name: "Robi"
      - badge_name: "[[[return states['vacuum.valetudo_falsescrawnyhornet'].attributes.status]]]"
      - badge_label: "[[[return states['vacuum.valetudo_falsescrawnyhornet'].attributes.battery_level + '%']]]"
      - badge_entity: "vacuum.valetudo_falsescrawnyhornet"
  - type: "custom:valetudo-map-card"
    vacuum: "valetudo_falsescrawnyhornet"
    title: []
    wall_color: "--blue"
    floor_color: "--blue"
    segment_colors: "--blue"
    segment_opacity: 0.2
    vacuum_color: "--purple"
    dock_color: "--yellow"
    path_color: "--purple"
    map_scale: 1.5
    icon_scale: 0.8
    show_status: false
    show_segments: true
    show_start_button: false
    show_battery_level: false
    show_locate_button: false
  - type: "grid"
    columns: 3
    square: false
    cards:
      - type: "custom:decluttering-card"
        template: "vacuum_zone_card"
        variables:
          - name: "Wohnzimmer"
          - icon: "mdi:sofa"
          - entity: "input_boolean.living_room_select_vacuuming"
          - label: "[[[return states['input_datetime.living_room_last_vacuumed'].state ]]]"
      - type: "custom:decluttering-card"
        template: "vacuum_zone_card"
        variables:
          - name: "Küche"
          - icon: "mdi:silverware-fork-knife"
          - entity: "input_boolean.kitchen_select_vacuuming"
          - label: "[[[return states['input_datetime.kitchen_last_vacuumed'].state ]]]"
      - type: "custom:decluttering-card"
        template: "vacuum_zone_card"
        variables:
          - name: "Flur"
          - icon: "mdi:floor-plan"
          - entity: "input_boolean.floor_select_vacuuming"
          - label: "[[[return states['input_datetime.hallway_last_vacuumed'].state ]]]"
      - type: "custom:button-card"
        entity: "input_boolean.general_robot_vacuum_cleaner_zones_selected"
        icon: "mdi:robot-vacuum"
        name: "Zonen"
        label: "Zonen"
        show_label: true
        tap_action:
          action: "call-service"
          service: "script.vacuuming_of_selection"
          haptic: "success"
        state:
          - value: "off"
            name: "Reinige"
            icon: "mdi:home"
        styles:
          icon:
            - width: "24px"
            - color: "var(--black)"
          img_cell:
            - justify-content: "flex-start"
            - margin-top: "-4px"
          name:
            - justify-self: "start"
            - color: "var(--black)"
            - font-size: "12px"
            - margin-bottom: "0px"
          card:
            - height: "84px"
            - background-color: "var(--green)"
            - box-shadow: "none"
            - border-radius: "24px"
            - padding: "12px 0 12px 14px"
            - z-index: 1
          label:
            - justify-self: "start"
            - color: "var(--black)"
            - font-size: "12px"
      - type: "custom:button-card"
        icon: "mdi:numeric-1-box"
        entity: "input_number.general_robot_vacuum_cleaner_zone_repetitions"
        name: "Anzahl"
        label: "Wiederholungen"
        show_label: true
        state:
          - value: "1.0"
            icon: "mdi:numeric-1-box"
          - value: "2.0"
            icon: "mdi:numeric-2-box"
          - value: "3.0"
            icon: "mdi:numeric-3-box"
        tap_action:
          action: "call-service"
          service: "script.vacuum_repetitions"
          haptic: "medium"
        styles:
          icon:
            - width: "24px"
            - color: "var(--contrast1)"
          img_cell:
            - justify-content: "flex-start"
            - margin-top: "-4px"
          name:
            - justify-self: "start"
            - color: "var(--contrast1)"
            - font-size: "12px"
            - margin-bottom: "0px"
          card:
            - height: "84px"
            - background-color: "var(--contrast20)"
            - box-shadow: "none"
            - border-radius: "24px"
            - padding: "12px 0 12px 14px"
            - z-index: 1
          label:
            - justify-self: "start"
            - color: "var(--contrast1)"
            - font-size: "12px"
      - type: "custom:button-card"
        icon: "mdi:broom"
        name: "Entleerung"
        label: "[[[return Math.round(states['sensor.valetudo_falsescrawnyhornet_current_statistics_area'].state / 10000).toFixed(0) + ' m² gesaugt']]]"
        show_label: true
        tap_action:
          action: "call-service"
          service: "script.vacuum_go_to_the_trash_can"
          haptic: "success"
        styles:
          icon:
            - width: "24px"
            - color: "var(--contrast1)"
          img_cell:
            - justify-content: "flex-start"
            - margin-top: "-4px"
          name:
            - justify-self: "start"
            - color: "var(--contrast1)"
            - font-size: "12px"
            - margin-bottom: "0px"
          card:
            - height: "84px"
            - background-color: "var(--contrast20)"
            - box-shadow: "none"
            - border-radius: "24px"
            - padding: "12px 0 12px 14px"
            - z-index: 1
          label:
            - justify-self: "start"
            - color: "var(--contrast11)"
            - font-size: "12px"
      - type: "custom:button-card"
        color_type: "blank-card"
