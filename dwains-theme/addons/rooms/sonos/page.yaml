# dwains_theme
## Room add-on: Sonos
## Created by Jeroen Klompen
## Version: 1.0.3

- type: custom:dwains-flexbox-card
  items_classes: 'col-xs-12 col-sm-6 col-sm-6'
  #padding: true
  cards:
    - type: entities
      style: |
        ha-card {
          border-radius: 5px;
          background-color: var(--dwains-theme-primary);
          --paper-slider-knob-color: var(--dwains-theme-names);
          --paper-slider-active-color: var(--dwains-theme-names);
          --paper-slider-knob-start-color: var(--dwains-theme-grey);
          --paper-slider-container-color: var(--dwains-theme-grey);
        }
      entities:
        - entity: {{ (data | fromjson)['entity'] }}
          group: true
          name: Sonos
          info: scroll
          type: 'custom:mini-media-player'
          hide:
            power: true
            icon: true
            source: true
            icon_state: false
            power_color: false
          speaker_group:
            platform: sonos
            show_group_count: true
            entities:
              - entity_id: media_player.wohnzimmer
                name: 'Wohnzimmer'
              - entity_id: media_player.schlafzimmer
                name: 'Schlafzimmer'
              - entity_id: media_player.bad
                name: 'Bad'
              - entity_id: media_player.buro
                name: 'Büro'
          shortcuts:
            columns: 3
            hide_when_off: true
            label: Musikquelle auswählen
            align_text: center
            buttons:
              - name: SWR1
                type: source
                id: SWR1 BAden-Württemberg
              - name: SWR2
                type: source
                id: SWR2
              - name: SWR3
                type: source
                id: SWR3


    - type: entities
      style: |
        ha-card {
          border-radius: 5px;
          background-color: var(--dwains-theme-primary);
          --paper-slider-knob-color: var(--dwains-theme-names);
          --paper-slider-active-color: var(--dwains-theme-names);
          --paper-slider-knob-start-color: var(--dwains-theme-grey);
          --paper-slider-container-color: var(--dwains-theme-grey);
        }
      entities:
        - type: 'custom:slider-entity-row'
          entity: media_player.wohnzimmer
          icon: 'mdi:speaker'
          name: 'Wohnzimmer'
        - type: 'custom:slider-entity-row'
          entity: media_player.schlafzimmer
          icon: 'mdi:speaker'
          name: 'Schlafzimmer'
        - type: 'custom:slider-entity-row'
          entity: media_player.bad
          icon: 'mdi:speaker'
          name: 'Bad'
        - type: 'custom:slider-entity-row'
          entity: media_player.buro
          icon: 'mdi:speaker'
          name: 'Büro'