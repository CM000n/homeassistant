########################################################
#                                                       #
#            AUTOMATISCHE BALKONBEWÄSSERUNG             #
#                                                       #
#########################################################

# https://www.splitbrain.org/blog/2017-06/10-automated_plant_watering

  - alias: 'Balkonbewässerung starten'
    trigger:
      platform: time
      at: '10:00:00'
    condition:
      - condition: state
        entity_id: 'binary_sensor.wasserstand'
        state: 'off'
    action:
      - service: switch.turn_on
        entity_id: switch.wasserpumpe

  - alias: 'Balkonbewässerung beenden'
    trigger:
      - platform: time
        at: '10:08:00'
      - platform: state
        entity_id: 'binary_sensor.wasserstand'
        to: 'on'
    action:
      - service: switch.turn_off
        entity_id: switch.wasserpumpe

  - alias: 'Benachrichtigung - Wasserstand Balkonbewässerung niedrig'
    trigger:
      platform: state
      entity_id: binary_sensor.wasserstand
      from: 'off'
      to: 'on'
    action:
      - service: notify.home_assistant_smtp
        data:
          title: 'Wasserstand Balkonbewässerung niedrig'
          message: 'Der Wasserstand im Behälter für die Balkonbewässerung ist niedrig. Er sollte aufgefüllt werden!'

########################################################
#                                                       #
#            END OF CONFIGURATION FILE                  #
#                                                       #
#########################################################
