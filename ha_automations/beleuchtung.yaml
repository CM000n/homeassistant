########################################################
#                                                       #
#              ERZWINGEN VON SENSORUPDATES              #
#                                                       #
#########################################################

- id: 'a_bl_1'
  alias: Beleuchtung - Lichter an wenn anwesend
  trigger:
  - entity_id: group.anwesenheit
    platform: state
    to: home
  action:
  - data:
      entity_id:
      - light.ankleide_deckenlampe_light
      - light.ankleide_schreibtisch_light
      - light.buero_deckenlampe_light
      - light.buero_schreibtisch_light
      - light.kueche_herd_light
      - light.schlafzimmer_deckenlampe_light
      - light.deckenlampe_wohnzimmer
      - light.flur_deckenlampe1_light
      - light.flur_deckenlampe2_light
      - light.schreibtischlampe_lisa
      - light.spiegellampe_bad
      - light.wandlampen_treppenhaus
    service: light.turn_on


- id: 'a_bl_2'
  alias: Beleuchtung - Lichter aus wenn abwesend
  trigger:
  - entity_id: group.anwesenheit
    platform: state
    to: not_home
  action:
  - data:
      entity_id:
      - light.ankleide_deckenlampe_light
      - light.deckenlampe_bad
      - light.buero_deckenlampe_light
      - light.buero_schreibtisch_light
      - light.kueche_herd_light
      - light.schlafzimmer_deckenlampe_light
      - light.deckenlampe_wohnzimmer
      - light.flur_deckenlampe1_light
      - light.flur_deckenlampe2_light
      - light.lightstrip_wohnzimmer
      - light.schlafzimmer_nachttisch_lisa_light
      - light.schlafzimmer_nachttisch_simon_light
      - light.ankleide_schreibtisch_light
      - light.spiegellampe_bad
      - light.stehlampe_wohnzimmer_rechts
      - light.stehlampe_wohnzimmer_links
    service: light.turn_off


- id: 'a_bl_3'
  alias: Beleuchtung - Verkehrslicht an
  trigger:
  - minutes: /1
    seconds: 0
    platform: time_pattern
  condition:
  - after: 06:00:00
    before: 07:30:00
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    condition: time
  - condition: state
    entity_id: group.anwesenheit
    state: home
  action:
  - data_template:
      entity_id: light.stehlampe_wohnzimmer_links
    service: python_script.traffic


- id: 'a_bl_4'
  alias: Beleuchtung - Verkehrslicht aus
  trigger:
  - at: 07:31:00
    platform: time
  condition:
  - after: 07:30:00
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
    condition: time
  action:
  - data:
      entity_id: light.stehlampe_wohnzimmer_links
    service: light.turn_off

- id: 'a_bl_5'
  alias: Beleuchtung - Autofarbtemparaturen an bei Start
  trigger:
  - event: start
    platform: homeassistant
  condition: []
  action:
  - data:
      entity_id: 
      - switch.circadian_lighting_autofarbtemperatur_deckenlampe_buro
      - switch.circadian_lighting_autofarbtemperatur_deckenlampe_schlafzimmer
      - switch.circadian_lighting_autofarbtemperatur_wohnzimmer
      - switch.circadian_lighting_autofarbtemperatur_deckenlampen_flur
    service: homeassistant.turn_on


- id: 'a_bl_6'
  alias: Beleuchtung - Flurlicht an bei Sonnenuntergang
  trigger:
  - event: sunset
    platform: sun
  condition:
  - after: sunset
    condition: sun
  - condition: state
    entity_id: group.anwesenheit
    state: home
  action:
  - data:
      entity_id: light.deckenlampen_flur
    service: light.turn_on


- id: 'a_bl_7'
  alias: Beleuchtung - Lightstrip Wohnzimmer mit Deckenlampe an
  trigger:
  - entity_id: light.wohnzimmer_deckenlampe
    platform: state
    to: 'on'
  - entity_id: sensor.deckenlampe_wohnzimmer_rest_reachable
    platform: state
    to: 'True'
  condition: []
  action:
  - data:
      brightness: 55
      color_temp: 440
      entity_id: light.wohnzimmer_lightstrip
      transition: 180
    service: light.turn_on


- id: 'a_bl_8'
  alias: Beleuchtung - Lightstrip Wohnzimmer mit Deckenlampe aus
  trigger:
  - entity_id: light.wohnzimmer_deckenlampe
    platform: state
    from: 'on'
  - entity_id: sensor.deckenlampe_wohnzimmer_rest_reachable
    platform: state
    to: 'False'
  condition: []
  action:
  - data:
      entity_id: light.wohnzimmer_lightstrip
    service: light.turn_off


- id: 'a_bl_9'
  alias: Beleuchtung - Weihnachtsbeleuchtung einschalten
  trigger:
  - seconds: /5
    platform: time_pattern
  condition:
  - condition: state
    entity_id: input_boolean.switch_weihnachtsbeleuchtung
    state: 'on'
  action:
  - data:
      entity_id: switch.circadian_lighting_circadian_lighting
    service: switch.turn_off
  - data:
      entity_id: script.weihnachtsbeleuchtung
    service: script.turn_on


- id: 'a_bl_10'
  alias: Beleuchtung - Weihanchtsbeleuchtung ausschalten
  trigger:
  - entity_id: input_boolean.switch_weihnachtsbeleuchtung
    platform: state
    to: 'off'
  condition: []
  action:
  - data:
      entity_id: switch.circadian_lighting_circadian_lighting
    service: switch.turn_on
  - data:
      entity_id: script.weihnachtsbeleuchtung
    service: script.turn_off


- id: 'a_bl_11'
  alias: Beleuchtung - Weisses Funkeln einschalten
  trigger:
  - seconds: /5
    platform: time_pattern
  condition:
  - condition: state
    entity_id: input_boolean.switch_weisses_funkeln
    state: 'on'
  action:
  - data:
      entity_id: switch.circadian_lighting_circadian_lighting
    service: switch.turn_off
  - data:
      entity_id: script.weisses_funkeln
    service: script.turn_on


- id: 'a_bl_12'
  alias: Beleuchtung - Weisses Funkeln ausschalten
  trigger:
  - entity_id: input_boolean.switch_weisses_funkeln
    platform: state
    to: 'off'
  condition: []
  action:
  - data:
      entity_id: switch.circadian_lighting_circadian_lighting
    service: switch.turn_on
  - data:
      entity_id: script.weisses_funkeln
    service: script.turn_off


- id: 'a_bl_13'
  alias: Beleuchtung - Helle Beleuchtung Wohnzimmer ein
  trigger:
  - platform: state
    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_hell
    to: 'on'
  action:
  - data:
      entity_id: 
      - input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
      - input_boolean.switch_wohnzimmer_beleuchtung_automatik
      - input_boolean.switch_wohnzimmer_beleuchtung_aus
      - switch.circadian_lighting_autofarbtemperatur_wohnzimmer
    service: homeassistant.turn_off
  - data:
      profile: energize
      entity_id:
      - light.wohnzimmer_deckenlampe
      - light.wohnzimmer_lightstrip
      - light.stehlampe_wohnzimmer_links
    service: light.turn_on

- id: 'a_bl_14'
  alias: Beleuchtung - Gemütliche Beleuchtung Wohnzimmer ein
  trigger:
  - platform: state
    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
    to: 'on'
  action:
  - data:
      entity_id: 
      - input_boolean.switch_wohnzimmer_beleuchtung_hell
      - input_boolean.switch_wohnzimmer_beleuchtung_automatik
      - input_boolean.switch_wohnzimmer_beleuchtung_aus
      - switch.circadian_lighting_autofarbtemperatur_wohnzimmer
    service: homeassistant.turn_off
  - data:
      profile: relax
      entity_id:
      - light.wohnzimmer_deckenlampe
      - light.wohnzimmer_lightstrip
      - light.stehlampe_wohnzimmer_links
    service: light.turn_on

- id: 'a_bl_15'
  alias: Beleuchtung - Automatische Beleuchtung Wohnzimmer ein
  trigger:
  - platform: state
    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_automatik
    to: 'on'
  action:
  - data:
      entity_id: 
      - input_boolean.switch_wohnzimmer_beleuchtung_hell
      - input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
      - input_boolean.switch_wohnzimmer_beleuchtung_aus
    service: homeassistant.turn_off
  - data:
      entity_id: switch.circadian_lighting_autofarbtemperatur_wohnzimmer
    service: homeassistant.turn_on
  - data:
      entity_id:
      - light.wohnzimmer_deckenlampe
      - light.wohnzimmer_lightstrip
      - light.stehlampe_wohnzimmer_links
    service: light.turn_on

- id: 'a_bl_16'
  alias: Beleuchtung - Beleuchtung Wohnzimmer aus
  trigger:
  - platform: state
    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_aus
    to: 'on'
  action:
  - data:
      entity_id: 
      - input_boolean.switch_wohnzimmer_beleuchtung_hell
      - input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
      - input_boolean.switch_wohnzimmer_beleuchtung_automatik
      - switch.circadian_lighting_autofarbtemperatur_wohnzimmer
    service: homeassistant.turn_off
  - data:
      entity_id: 
      - light.wohnzimmer_deckenlampe
      - light.wohnzimmer_lightstrip
      - light.stehlampe_wohnzimmer_links
      - light.stehlampe_wohnzimmer_rechts
    service: light.turn_off

- id: 'a_bl_17'
  alias: Deckenlampe Herd auf Kaltweis bei Start
  trigger:
    - platform: state
      entity_id: light.kuche_herd
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.kuche_herd
        brightness: 255
        kelvin: 6500

- id: 'a_bl_18'
  alias: Deckenlampe Bad mit Deckenlampe an
  trigger:
    - platform: state
      entity_id: light.shelly_deckenlampe_bad
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.shelly_badspiegel

- id: 'a_bl_19'
  alias: Spiegellampe Bad mit Deckenlampe aus
  trigger:
    - platform: state
      entity_id: light.shelly_deckenlampe_bad
      from: 'on'
  action:
    - service: light.turn_off
      data:
        entity_id: light.shelly_badspiegel

- id: 'a_bl_20'
  alias: Deckenlampe Ankleide auf Kaltweis bei Start
  trigger:
    - platform: state
      entity_id: light.ankleide_deckenlampe
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.ankleide_deckenlampe
        brightness: 255
        kelvin: 6500

- id: 'a_bl_21'
  alias: Schreibtischlampe Ankleide auf Kaltweis bei Start
  trigger:
    - platform: state
      entity_id: light.ankleide_schreibtisch
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.ankleide_schreibtisch
        brightness: 255
        kelvin: 6500

- id: 'a_bl_22'
  alias: Ankleide Nähtisch Wand auf Kaltweis bei Start
  trigger:
    - platform: state
      entity_id: light.ankleide_nahtisch_wand
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.ankleide_nahtisch_wand
        brightness: 255
        kelvin: 6500

- id: 'a_bl_23'
  alias: Ankleide Nähtisch Links auf Kaltweis bei Start
  trigger:
    - platform: state
      entity_id: light.ankleide_nahtisch_links
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.ankleide_nahtisch_links
        brightness: 255
        kelvin: 6500

- id: 'a_bl_24'
  alias: Ankleide Nähtisch Rechts auf Kaltweis bei Start
  trigger:
    - platform: state
      entity_id: light.ankleide_nahtisch_rechts
      to: 'on'
  action:
    - service: light.turn_on
      data:
        entity_id: light.ankleide_nahtisch_rechts
        brightness: 255
        kelvin: 6500

