- alias: Benachrichtigung - Willkommen zurück Simon
  trigger:
    platform: state
    from: not_home
    to: home
    entity_id: device_tracker.simonmotog4plus
  action:
  - service: media_player.sonos_snapshot
    data_template:
      entity_id:
      - media_player.sonos_wohnzimmer
      - media_player.sonos_schlafzim
      - media_player.sonos_bad
  - service: media_player.volume_set
    data_template:
      entity_id:
      - media_player.sonos_wohnzimmer
      - media_player.sonos_schlafzim
      - media_player.sonos_bad
      volume_level: '0.6'
  - service: tts.google_say
    data_template:
      entity_id:
      - media_player.sonos_wohnzimmer
      - media_player.sonos_schlafzim
      - media_player.sonos_bad
      message: Willkommen zurück Simon.
  - delay: 00:00:{{ ('0' ~ states.media_player.sonos_wohnzimmer.attributes.media_duration)
      | reverse | truncate(2, True, '') | reverse }}
  - delay: 00:00:{{ ('0' ~ states.media_player.sonos_schlafzim.attributes.media_duration)
      | reverse | truncate(2, True, '') | reverse }}
  - delay: 00:00:{{ ('0' ~ states.media_player.sonos_bad.attributes.media_duration)
      | reverse | truncate(2, True, '') | reverse }}
  - service: media_player.sonos_restore
    data_template:
      entity_id:
      - media_player.sonos_wohnzimmer
      - media_player.sonos_schlafzim
      - media_player.sonos_bad
  id: 63b66e56b989423ca10b3d59240a95b6


- id: '1545984584120'
  alias: Benachrichtigung - Waschmaschine fertig
  trigger:
  - entity_id: sensor.status_waschmaschine
    platform: state
    to: Fertig
  condition: []
  action:
  - data:
      message: Die Waschmaschine hat den Waschvorgang beendet und kann ausgeräumt
        werden
      title: Waschmaschine fertig
    service: notify.home_assistant_smtp


- id: '1545985715098'
  alias: Benachrichtigung - Trockner fertig
  trigger:
  - entity_id: sensor.status_trockner
    platform: state
    to: Fertig
  condition: []
  action:
  - data:
      message: Der Trockner hat den Trockenvorgang beendet und kann ausgeräumt werden
      title: Trockner fertig
    service: notify.home_assistant_smtp


- id: '1545985877047'
  alias: Benachrichtigung  - Spülmaschine fertig
  trigger:
  - entity_id: sensor.status_spuelmaschine
    platform: state
    to: Aus
  condition: []
  action:
  - data:
      message: Die Spülmaschine hat den Spülvorgang beendet und kann ausgeräumt werden
      title: Spülmaschine fertig
    service: notify.home_assistant_smtp

- id: '1545986733209'
  alias: Benachrichtigung - Geburtstag
  trigger:
  - at: '12:00:00'
    platform: time
  - at: '18:00:00'
    platform: time
  condition:
  - condition: state
    entity_id: 'calendar.contacts'
    state: 'on'
  action:
  - data:
      message: '{{ states.calendar.contacts.attributes.message }}'
      title: Erinnerung
    service: notify.home_assistant_smtp


- id: '1545992651715'
  alias: Benachrichtigung - Login Fehlversuch
  trigger:
  - entity_id: persistent_notification.httplogin
    platform: state
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != ''None'' }}'
  action:
  - data:
      message: '{{ trigger.to_state.state }}'
      title: Fehlerhafter Loginversuch auf Homeassistant
    service: notify.home_assistant_smtp


- id: '1545993460975'
  alias: Benachrichtigung - Neues Netzwerkgerät
  trigger:
  - event_data: {}
    event_type: device_tracker_new_device
    platform: event
  condition: []
  action:
  - data:
      message: '> Neues Netzwerkgerät: {{trigger.event.data.host_name}} {{trigger.event.data.entity_id}}'
      title: Neues Netzwerkgerät
    service: notify.home_assistant_smtp


- id: '1545997063800'
  alias: Benachrichtigung - Geänderte IP-Adresse
  trigger:
  - entity_id: sensor.myip
    platform: state
  condition: []
  action:
  - data:
      message: 'Die öffentliche IP hat sich geändert: {{ trigger.from_state.state}}
        → {{ trigger.to_state.state }}'
      title: Die IP-Adresse hat sich geändert
    service: notify.home_assistant_smtp

- id: '1545997863800'
  alias: Reminder for Simon
  trigger:
  - platform: state
    entity_id: device_tracker.google_maps_113462452053772321900
    to: home
  condition:
    condition: and
    conditions:
      - condition: template
        value_template: "{{ states.input_text.reminder_simon.state != '' }}"
  action:
  - service: notify.home_assistant_smtp
    data:
      title: Erinnerung
      message: "{{ states.input_text.reminder_simon.state }}"
  - service: input_text.set_value
    data_template:
      entity_id: input_text.reminder_simon
      value: ''

- id: '154599787693800'
  alias: Reminder for Lisa
  trigger:
  - platform: state
    entity_id: device_tracker.lisa_handy
    to: home
  condition:
    condition: and
    conditions:
      - condition: template
        value_template: "{{ states.input_text.reminder_lisa.state != '' }}"
  action:
  - service: notify.home_assistant_smtp_2
    data:
      title: Erinnerung
      message: "{{ states.input_text.reminder_lisa.state }}"
  - service: input_text.set_value
    data_template:
      entity_id: input_text.reminder_lisa
      value: ''

