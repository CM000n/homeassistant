########################################################
#                                                       #
#              ERZWINGEN VON SENSORUPDATES              #
#                                                       #
#########################################################

- id: '1545984584120'
  alias: Benachrichtigung - Waschmaschine fertig
  trigger:
  - entity_id: sensor.status_waschmaschine
    platform: state
    to: Fertig
  condition: []
  action:
  - data:
      message: Die Waschmaschine hat den Waschvorgang beendet und kann ausgeräumt
        werden
      title: Waschmaschine fertig
    service: notify.home_assistant_smtp


- id: '1545985715098'
  alias: Benachrichtigung - Trockner fertig
  trigger:
  - entity_id: sensor.status_trockner
    platform: state
    to: Fertig
  condition: []
  action:
  - data:
      message: Der Trockner hat den Trockenvorgang beendet und kann ausgeräumt werden
      title: Trockner fertig
    service: notify.home_assistant_smtp


- id: '1545985877047'
  alias: Benachrichtigung - Spülmaschine fertig
  trigger:
  - entity_id: sensor.status_spuelmaschine
    platform: state
    to: Aus
  condition: []
  action:
  - data:
      message: Die Spülmaschine hat den Spülvorgang beendet und kann ausgeräumt werden
      title: Spülmaschine fertig
    service: notify.home_assistant_smtp


- id: '1545986733209'
  alias: Benachrichtigung - Geburtstag
  trigger:
  - at: '12:00:00'
    platform: time
  - at: '18:00:00'
    platform: time
  condition:
  - condition: state
    entity_id: 'calendar.contacts'
    state: 'on'
  action:
  - data_template:
      message: >
        '{{ state_attr('calendar.contacts', 'message') }}'
      title: Erinnerung
    service: notify.home_assistant_smtp


- id: '1545992651715'
  alias: Benachrichtigung - Login Fehlversuch
  trigger:
  - entity_id: persistent_notification.httplogin
    platform: state
  condition:
  - condition: template
    value_template: '{{ trigger.to_state.state != ''None'' }}'
  action:
  - data:
      message: '{{ trigger.to_state.state }}'
      title: Fehlerhafter Loginversuch auf Homeassistant
    service: notify.home_assistant_smtp


- id: '1545993460975'
  alias: Benachrichtigung - Neues Netzwerkgerät
  trigger:
  - event_data: {}
    event_type: device_tracker_new_device
    platform: event
  condition: []
  action:
  - data:
      message: '> Neues Netzwerkgerät: {{trigger.event.data.host_name}} {{trigger.event.data.entity_id}}'
      title: Neues Netzwerkgerät
    service: notify.home_assistant_smtp


- id: '1545997063800'
  alias: Benachrichtigung - Geänderte IP-Adresse
  trigger:
  - entity_id: sensor.myip
    platform: state
  condition: []
  action:
  - data:
      message: 'Die öffentliche IP hat sich geändert: {{ trigger.from_state.state}}
        → {{ trigger.to_state.state }}'
      title: Die IP-Adresse hat sich geändert
    service: notify.home_assistant_smtp


- id: '1545997863800'
  alias: Benachrichtigung - Reminder for Simon
  trigger:
  - platform: state
    entity_id: device_tracker.google_maps_113462452053772321900
    to: home
  condition:
    condition: and
    conditions:
      - condition: template
        value_template: "{{ states('input_text.reminder_simon') != '' }}"
  action:
  - service: notify.home_assistant_smtp
    data:
      title: Erinnerung
      message: "{{ states('input_text.reminder_simon') }}"
  - service: input_text.set_value
    data_template:
      entity_id: input_text.reminder_simon
      value: ''


- id: '154599787693800'
  alias: Benachrichtigung - Reminder for Lisa
  trigger:
  - platform: state
    entity_id: device_tracker.lisa_handy
    to: home
  condition:
    condition: and
    conditions:
      - condition: template
        value_template: "{{ states('input_text.reminder_lisa') != '' }}"
  action:
  - service: notify.home_assistant_smtp_2
    data:
      title: Erinnerung
      message: "{{ states('input_text.reminder_lisa') }}"
  - service: input_text.set_value
    data_template:
      entity_id: input_text.reminder_lisa
      value: ''


