########################################################
#                                                       #
#             AUTOMATIKEN BELEUCHTUNG BÜRO              #
#                                                       #
#########################################################

- id: 'a_bl_buero_sl_1'
  alias: Beleuchtung - Büro Schreibtischlampe Automatische Lichtstimmung
  trigger:
  - platform: state
    entity_id: input_select.buero_schreibtischlampe_lichtstimmung
    to: 'Automatik'
  action:
  - data:
      entity_id: switch.circadian_lighting_autofarbtemperatur_schreibtischlampe_buro
    service: homeassistant.turn_on
  - data:
      entity_id:
      - light.buro_schreibtisch
    service: light.turn_on

- id: 'a_bl_buero_sl_2'
  alias: Beleuchtung - Büro Schreibtischlampe Energie tanken Lichtstimmung
  trigger:
  - platform: state
    entity_id: input_select.buero_schreibtischlampe_lichtstimmung
    to: 'Energie tanken'
  action:
  - data:
      entity_id: 
      - switch.circadian_lighting_autofarbtemperatur_schreibtischlampe_buro
    service: homeassistant.turn_off
  - data:
      profile: energize
      entity_id:
      - light.buro_schreibtisch
    service: light.turn_on

- id: 'a_bl_buero_sl_3'
  alias: Beleuchtung - Büro Schreibtischlampe Lesen Lichtstimmung
  trigger:
  - platform: state
    entity_id: input_select.buero_schreibtischlampe_lichtstimmung
    to: 'Lesen'
  action:
  - data:
      entity_id: 
      - switch.circadian_lighting_autofarbtemperatur_schreibtischlampe_buro
    service: homeassistant.turn_off
  - data:
      profile: reading
      entity_id:
      - light.buro_schreibtisch
    service: light.turn_on

- id: 'a_bl_buero_sl_4'
  alias: Beleuchtung - Büro Schreibtischlampe Konzentrieren Lichtstimmung
  trigger:
  - platform: state
    entity_id: input_select.buero_schreibtischlampe_lichtstimmung
    to: 'Konzentrieren'
  action:
  - data:
      entity_id: 
      - switch.circadian_lighting_autofarbtemperatur_schreibtischlampe_buro
    service: homeassistant.turn_off
  - data:
      profile: concentrate
      entity_id:
      - light.buro_schreibtisch
    service: light.turn_on

- id: 'a_bl_buero_sl_5'
  alias: Beleuchtung - Büro Schreibtischlampe Entspannen Lichtstimmung
  trigger:
  - platform: state
    entity_id: input_select.buero_schreibtischlampe_lichtstimmung
    to: 'Entspannen'
  action:
  - data:
      entity_id: 
      - switch.circadian_lighting_autofarbtemperatur_schreibtischlampe_buro
    service: homeassistant.turn_off
  - data:
      profile: relax
      entity_id:
      - light.buro_schreibtisch
    service: light.turn_on



