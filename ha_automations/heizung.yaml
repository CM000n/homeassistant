########################################################
#                                                       #
#              ERZWINGEN VON SENSORUPDATES              #
#                                                       #
#########################################################

- id: 'a_hz_1'
  alias: Heizung - Auf Comfort beim heimkommen
  trigger:
  - entity_id: group.anwesenheit
    platform: state
    to: home
  condition:
  - before: 00:00:00
    after: 04:00:00
    condition: time
  - below: 18
    condition: numeric_state
    entity_id: sensor.darksky_temperature
  action:
  - data:
      entity_id:
      - climate.heizung_buro
      - climate.heizung_bad
      temperature: 22
    service: climate.set_temperature


- id: 'a_hz_2'
  alias: Heizung - Auf Eco wenn abwesend
  trigger:
  - entity_id: group.anwesenheit
    from: home
    platform: state
  condition: []
  action:
  - data:
      entity_id:
      - climate.heizung_buro
      - climate.heizung_bad
      temperature: 18
    service: climate.set_temperature


- id: 'a_hz_3'
  alias: Heizung - Auß bei zu hoher Außentemperatur
  trigger:
  - above: 18
    entity_id: sensor.darksky_temperature
    platform: numeric_state
  condition: []
  action:
  - data:
      entity_id:
      - climate.heizung_buro
      - climate.heizung_bad
    service: climate.turn_off


########################################################
#                                                       #
#            END OF CONFIGURATION FILE                  #
#                                                       #
#########################################################
