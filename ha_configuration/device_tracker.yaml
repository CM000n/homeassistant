#           DEVICE TRACKER - FRITZBOX              #
#                                                  #
####################################################

#https://www.home-assistant.io/components/device_tracker.fritz/

 - platform: fritz
   host: 192.168.178.1
   username: !secret fritz_devicetracker_username
   password: !secret fritz_devicetracker_password
   interval_seconds: 10
   consider_home: 180
   track_new_devices: True

