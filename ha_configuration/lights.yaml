#            REDUCE HUE SCAN INTERVAL              #
#                                                  #
####################################################

#https://www.home-assistant.io/docs/configuration/platform_options/

  - platform: hue
    scan_interval: 5

####################################################
#                                                  #
#                   LIGHTGROUPS                    #
#                                                  #
####################################################

#https://home-assistant.io/components/light.group/

  - platform: group
    name: Deckenlampen Flur
    entities:
      - light.flur_deckenlampe1
      - light.flur_deckenlampe2

  - platform: group
    name: Stehlampe Wohnzimmer Links
    entities:
      - light.wohnzimmer_stehlampe_links1
      - light.wohnzimmer_stehlampe_links2

  - platform: group
    name: Wandlampen Treppenhaus
    entities:
      - light.treppenhaus_wandlampe1
      - light.treppenhaus_wandlampe2
      - light.treppenhaus_wandlampe3

####################################################
#                                                  #
#                   LIGHTSWITCH                    #
#                                                  #
####################################################

