##https://home-assistant.io/components/recorder/

####################################################
#                                                  #
#                 RECORDER.YAML                    #
#                                                  #
####################################################

  db_url: !secret db_url
  auto_purge: false
  commit_interval: 1
  include:
    domains:
      - light
      - media_player
      - person
      - climate
    entities:
      - vacuum.xiaomi_vacuum_cleaner
      - sun.sun
      - binary_sensor.eingangstuer_bewegungsmelder_motion
      - sensor.season
      - binary_sensor.philipstv
      - switch.simon_pc
      - sensor.temperatur_wohnzimmer_lowboard
      - sensor.temperatur_wohness
      - sensor.temperatur_climate_bad
      - sensor.temperatur_climate_buero
      - sensor.temperatur_ankleide
      - sensor.temperatur_keller
      - switch.ambilight_test
      - sensor.temperature_kraichtal_gochsheim
      - sensor.pressure_kraichtal_gochsheim
      - sensor.wind_speed_kraichtal_gochsheim
      - sensor.wind_direction_kraichtal_gochsheim
      - sensor.visibility_kraichtal_gochsheim
      - sensor.humidity_kraichtal_gochsheim

####################################################
#                                                  #
#           END OF CONFIGURATION FILE              #
#                                                  #
####################################################
