
#https://home-assistant.io/components/switch/

####################################################
#                                                  #
#             WAKE ON LAN SWITCHES                 #
#                                                  #
####################################################

#https://home-assistant.io/components/switch.wake_on_lan/

  - platform: template
    switches:
      simon_pc:
        friendly_name: "Simon-PC"
        value_template: "{{ is_state('binary_sensor.simonpc', 'on') }}"
        turn_on:
          service: script.simon_pc_aufwecken
        turn_off:
          service: script.simon_pc_herunterfahren



####################################################
#                                                  #
#               CIRCADIAN LIGHTING                 #
#                                                  #
####################################################

#https://community.home-assistant.io/t/circadian-lighting-custom-component/61246

  - platform: circadian_lighting
    name: Autofarbtemperatur Deckenlampe Wohnzimmer
    lights_ct:
      - light.wohnzimmer_deckenlampe
    min_brightness: 20
    max_brightness: 100
  - platform: circadian_lighting
    name: Autofarbtemperatur Lightstrip Wohnzimmer
    lights_ct:
      - light.wohnzimmer_lightstrip
    min_brightness: 20
    max_brightness: 100
  - platform: circadian_lighting
    name: Autofarbtemperatur Stehlampe links Wohnzimmer
    lights_ct:
      - light.wohnzimmer_stehlampe_links1
      - light.wohnzimmer_stehlampe_links2
    min_brightness: 20
    max_brightness: 100
  - platform: circadian_lighting
    name: Autofarbtemperatur Stehlampe rechts Wohnzimmer
    lights_ct:
      - light.wohnzimmer_stehlampe_rechts
    min_brightness: 20
    max_brightness: 100

  - platform: circadian_lighting
    name: Küche Deckenlampe Herd
    lights_ct:
      - light.kuche_herd
    disable_brightness_adjust: true
  - platform: circadian_lighting
    name: Küche Deckenlampe Esstisch
    lights_ct:
      - light.kuche_esstisch
    disable_brightness_adjust: true

  - platform: circadian_lighting
    name: Autofarbtemperatur Deckenlampe Büro
    lights_ct:
      - light.buro_deckenlampe
    disable_brightness_adjust: true
  - platform: circadian_lighting
    name: Autofarbtemperatur Schreibtischlampe Büro
    lights_ct:
      - light.buro_schreibtisch
    disable_brightness_adjust: true

  - platform: circadian_lighting
    name: Autofarbtemperatur Deckenlampe Schlafzimmer
    lights_ct:
      - light.schlafzimmer_deckenlampe
    disable_brightness_adjust: true
  - platform: circadian_lighting
    name: Autofarbtemperatur Nachttisch Lisa
    lights_ct:
      - light.schlafzimmer_nachttisch_lisa
    disable_brightness_adjust: true
  - platform: circadian_lighting
    name: Autofarbtemperatur Nachttisch Simon
    lights_ct:
      - light.schlafzimmer_nachttisch_simon
    disable_brightness_adjust: true

  - platform: circadian_lighting
    name: Autofarbtemperatur Deckenlampe Kinderzimmer
    lights_ct:
      - light.kinderzimmer_deckenlampe
    min_brightness: 30
    max_brightness: 100
  - platform: circadian_lighting
    name: Autofarbtemperatur Tischleuchte Kinderzimmer
    lights_ct:
      - light.kinderzimmer_tischleuchte
    disable_brightness_adjust: true

  - platform: circadian_lighting
    name: Autofarbtemperatur Deckenlampen Flur
    lights_ct:
      - light.flur_deckenlampe_1
      - light.flur_deckenlampe_2
    disable_brightness_adjust: true
  - platform: circadian_lighting
    name: Autofarbtemperatur Wandlampe Treppenhaus
    lights_ct:
      - light.treppenhaus_wandlampe_1
      - light.treppenhaus_wandlampe_2
      - light.treppenhaus_wandlampe_3
    disable_brightness_adjust: true
  - platform: circadian_lighting
    name: Autofarbtemperatur Deckenlampen Eingangstür
    lights_ct:
      - light.eingangstuer_decke
    disable_brightness_adjust: true



####################################################
