---
default:
  #required
  - entity: ''
  #optional
  - show_last_changed: false
  - tap_action: toggle
  - hold_action: more-info
  - input_select_entity: ''

card:
  type: custom:button-card
  size: '80%'
  color: auto
  lock: false
  aspect_ratio: '1/1'
  entity: '[[entity]]'
  label: >
    [[[
      if ('brightness' in states['[[entity]]'].attributes) {
        var bri = Math.round(states['[[entity]]'].attributes.brightness / 2.55);
        return 'Helligkeit: ' + (bri ? bri : '0') + '%';
      } else {
        return '';
      }
    ]]]
  show_state: true
  show_label: true
  show_last_changed: '[[show_last_changed]]'
  tap_action:
    action: '[[tap_action]]'
  hold_action:
    action: '[[hold_action]]'
  double_tap_action:
    action: call-service
    service: input_select.select_next
    service_data:
      entity_id: '[[input_select_entity]]'
  styles:
    card:
      - border-radius: var(--ha-card-border-radius)
      - box-shadow: var(--button-card-box-shadow)
      - padding: 10px
    label:
      - font-size: 10px
      - justify-self: start
    grid:
      - grid-template-areas: '"i temp" "n n" "s s" "l l"'
      - grid-template-columns: 1fr
      - grid-template-rows: 1fr min-content min-content
    img_cell:
      - justify-content: start
      - align-items: start
    icon:
      - width: 35%
      - height: 50%
    name:
      - justify-self: start
      - font-size: 14px
      - font-weight: 400
    state:
      - justify-self: start
      - text-transform: capitalize
      - font-size: 14px
      - font-weight: 400
    custom_fields:
      temp:
        - align-self: start
        - justify-self: end
  custom_fields:
    temp: >
      [[[
        if (states['[[input_select_entity]]'].state == 'Automatik')
          return `<ha-icon
            icon="mdi:brightness-auto"
            style="width: 15px; height: 15px; color: grey;">
            </ha-icon>`;
        if (states['[[input_select_entity]]'].state == 'Entspannen')
          return `<ha-icon
            icon="mdi:brightness-4"
            style="width: 15px; height: 15px; color: grey;">
            </ha-icon>`;
        if (states['[[input_select_entity]]'].state == 'Lesen')
          return `<ha-icon
            icon="mdi:brightness-6"
            style="width: 15px; height: 15px; color: grey;">
            </ha-icon>`;
        if (states['[[input_select_entity]]'].state == 'Konzentrieren')
          return `<ha-icon
            icon="mdi:brightness-7"
            style="width: 15px; height: 15px; color: grey;">
            </ha-icon>`;
        if (states['[[input_select_entity]]'].state == 'Energie tanken')
          return `<ha-icon
            icon="mdi:brightness-5"
            style="width: 15px; height: 15px; color: grey;">
            </ha-icon>`;
      ]]]
  state:
    - value: "on" 
      styles:
        card:
          - --ha-card-background: var(--button-card-background-color-on)
          - --ha-card-box-shadow: var(--button-card-box-shadow-on)
        icon:
          - color: var(--button-card-icon-color-on)
        name:
          - color: var(--button-card-name-color-on)
        state:
          - color: var(--button-card-state-color-on)
        lock:
          - color: var(--button-card-lock-color-on)
        label:
          - color: var(--button-card-label-color-on)
    - operator: 'default'
      styles:
        card:
          - --ha-card-background: var(--button-card-background-color-off)
          - --ha-card-box-shadow: var(--button-card-box-shadow-off)
        icon:
          - color: var(--button-card-icon-color-off)
        name:
          - color: var(--button-card-name-color-off)
        state:
          - color: var(--button-card-state-color-off)
        lock:
          - color: var(--button-card-lock-color-off)
        label:
          - color: var(--button-card-label-color-off)