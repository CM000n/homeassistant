default:
  #required
card:
  type: vertical-stack
  style: |
    ha-card {
      margin: 10px 10px;
      box-shadow: none;
    }
  cards:
    - type: "custom:vacuum-card"
      style: |
        ha-card {
          box-shadow: none;
          color: white;
          --lovelace-background: white;
        }
      entity: vacuum.xiaomi_vacuum_cleaner
      show_name: false
      map: camera.robi_karte
      stats:
        default:
          - attribute: filter_left
            unit: Std.
            subtitle: Filter
          - attribute: side_brush_left
            unit: Std.
            subtitle: Seitenbürste
          - attribute: main_brush_left
            unit: Std.
            subtitle: Hauptbürste
          - attribute: sensor_dirty_left
            unit: Std.
            subtitle: Sensoren
        cleaning:
          - attribute: cleaned_area
            unit: m²
            subtitle: Reinigungsfläche
          - attribute: cleaning_time
            unit: Min.
            subtitle: Reinigungszeit
    - type: entities
      style: |
        ha-card {
          border: none;
          box-shadow: none;
        }
      show_header_toggle: false
      entities:
        - entity: automation.staubsauger_wochentags_reinigen
        - entity: automation.staubsauger_samstags_reinigen