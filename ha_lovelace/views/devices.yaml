title: Geräte
path:  devices
panel: true

cards:
  - type: "custom:homekit-card"
    useBrightness: true
    useTemperature: true
    breakOnMobile: true
    statePositionTop: true
    entities:
      - title: Wohn- / Esszimmer
        entities: 
          - entity: binary_sensor.philipstv
            tap_action:
              action: more-info
              entity: binary_sensor.philipstv
          - card: media-control
            tap_action:
              action: more-info
              entity: media_player.chromecast
            noPadding: true
            wider: true
            cardOptions:
              entity: media_player.chromecast
            cardStyle: |
              ha-card {
                height:100%;
              }
              .ratio {
                padding-bottom: 70%!important;
              }
          - card: media-control
            tap_action:
              action: more-info
              entity: media_player.wohnzimmer
            noPadding: true
            wider: true
            cardOptions:
              entity: media_player.wohnzimmer
            cardStyle: |
              ha-card {
                height:100%;
              }
              .ratio {
                padding-bottom: 70%!important;
              }
          - entity: sensor.status_spuelmaschine
            tap_action:
              action: more-info
              entity: sensor.status_spuelmaschine
      - title: Schlafzimmer / Ankleide
        entities:
          - card: media-control
            tap_action:
              action: more-info
              entity: media_player.schlafzimmer
            noPadding: true
            wider: true
            cardOptions:
              entity: media_player.schlafzimmer
            cardStyle: |
              ha-card {
                height:100%;
              }
              .ratio {
                padding-bottom: 70%!important;
              }
      - title: Badezimmer
        entities:
          - card: media-control
            tap_action:
              action: more-info
              entity: media_player.bad
            noPadding: true
            wider: true
            cardOptions:
              entity: media_player.bad
            cardStyle: |
              ha-card {
                height:100%;
              }
              .ratio {
                padding-bottom: 70%!important;
              }
      - title: Büro
        entities:
          - entity: binary_sensor.openmediavault
            tap_action:
              action: more-info
              entity: binary_sensor.openmediavault
          - entity: binary_sensor.simondrucker
            tap_action:
              action: more-info
              entity: binary_sensor.simondrucker
          - entity: switch.simon_pc
            tap_action:
              action: more-info
              entity: switch.simon_pc
          - card: media-control
            tap_action:
              action: more-info
              entity: media_player.buro
            noPadding: true
            wider: true
            cardOptions:
              entity: media_player.buro
            cardStyle: |
              ha-card {
                height:100%;
              }
              .ratio {
                padding-bottom: 70%!important;
              }
      - title: Keller
        entities:
          - entity: sensor.status_waschmaschine
            tap_action:
              action: more-info
              entity: sensor.status_waschmaschine
          - entity: sensor.status_trockner
            tap_action:
              action: more-info
              entity: sensor.status_trockner
      - title: Außen
        entities:
          - entity: switch.wasserpumpe
            tap_action:
              action: more-info
              entity: switch.wasserpumpe
