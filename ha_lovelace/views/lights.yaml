---
title: Lights
icon: 'mdi:lightbulb'
path: lights
panel: true
popup_cards:
  light.kitchen_wall:
    title: ""
    style:
      position: fixed
      z-index: 999
      top: 0
      left: 0
      height: 100%
      width: 100%
      display: block
      align-items: center
      justify-content: center
      background: rgba(0, 0, 0, 0.0)
      flex-direction: column
      margin: 0
      "--iron-icon-fill-color": "#FFF"
    card:
      type: custom:light-popup-card
      entity: light.kitchen_wall
      brightnessWidth: 150px
      brightnessHeight: 400px
      switchWidth: 150px
      switchHeight: 400px
      sliderColoredByLight: true
cards:
  - type: custom:homekit-card
    style: !include ../styles/homekit-card.yaml
    enableColumns: true
    rows:
      - row: 1
        columns:
          - column: 1
            entities:
              - title: Wohnzimmer
                entities: 
                  - card: custom:decluttering-card
                    noPadding: true
                    cardStyle: !include ../styles/graph-card.yaml
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.wohnzimmer_deckenlampe
                  - card: custom:decluttering-card
                    noPadding: true
                    cardStyle: !include ../styles/graph-card.yaml
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.wohnzimmer_lightstrip
                  - card: custom:decluttering-card
                    noPadding: true
                    cardStyle: !include ../styles/graph-card.yaml
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.stehlampe_wohnzimmer_links
                  - card: custom:decluttering-card
                    noPadding: true
                    cardStyle: !include ../styles/graph-card.yaml
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.wohnzimmer_stehlampe_rechts
      - row: 2
        columns:
          - column: 1
            entities:
              - title: Küche
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.kuche_herd
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.kuche_esstisch
      - row: 3
        columns:
          - column: 1
            entities:
              - title: Bad
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.shelly_deckenlampe_bad
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.shelly_badspiegel
      - row: 4
        columns:
          - column: 1
            entities:
              - title: Büro
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.buro_deckenlampe
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.buro_schreibtisch
      - row: 5
        columns:
          - column: 1
            entities:
              - title: Schlafzimmer
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.schlafzimmer_deckenlampe
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.schlafzimmer_nachttisch_simon
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.schlafzimmer_nachttisch_lisa
      - row: 6
        columns:
          - column: 1
            entities:
              - title: Ankleide
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.ankleide_deckenlampe
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.ankleide_schreibtisch
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.ankleide_nahtisch_wand
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.ankleide_nahtisch_links
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.ankleide_nahtisch_rechts
      - row: 7
        columns:
          - column: 1
            entities:
              - title: Flur & Treppenhaus
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.deckenlampen_flur
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: light-card
                      variables:
                        - entity: light.wandlampen_treppenhaus
