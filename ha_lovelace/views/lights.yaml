title: Licht
path:  lights
panel: true

cards:
  - type: "custom:homekit-card"
    useBrightness: true
    useTemperature: true
    breakOnMobile: true
    statePositionTop: true
    tileHoldAnimation: true
    entities:
      - title: Wohn- / Esszimmer
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities: 
          - entity: light.wohnzimmer_deckenlampe
            popupExtend:
              actions:
                - service: homeassistant.turn_on
                  service_data:
                    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
                  color: "#FDCA64"
                  name: Gemütlich
                - service: homeassistant.turn_on
                  service_data:
                    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_hell
                  color: "#BBEEF3"
                  name: Hell
                - service: homeassistant.turn_on
                  service_data:
                    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_automatik
                  color: "#FFE7C0"
                  name: Automatik
          - entity: light.wohnzimmer_lightstrip
          - entity: light.stehlampe_wohnzimmer_links
          - entity: light.wohnzimmer_stehlampe_rechts
          - entity: light.kuche_herd
          - entity: light.kuche_esstisch
      - title: Schlafzimmer
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.schlafzimmer_deckenlampe
          - entity: light.schlafzimmer_nachttisch_lisa
          - entity: light.schlafzimmer_nachttisch_simon
      - title: Ankleide
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.ankleide_deckenlampe
          - entity: light.ankleide_schreibtisch
          - entity: light.ankleide_nahtisch_wand
          - entity: light.ankleide_nahtisch_links
          - entity: light.ankleide_nahtisch_rechts
      - title: Badezimmer
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.shelly_deckenlampe_bad
          - entity: light.shelly_badspiegel
      - title: Büro
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.buro_deckenlampe
          - entity: light.buro_schreibtisch
      - title: Flur / Treppenhaus
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.deckenlampen_flur
          - entity: light.wandlampen_treppenhaus