title: Home
path: home_simon
icon: mdi:home
panel: true

cards:
  - type: "custom:homekit-card"
    style: |
      :host {
        --tile-background: rgba(255, 255, 255, 0.3);
        --tile-border-radius: 12px;
        --tile-width: 100px;
        --tile-height: 100px;
        --tile-on-background: rgba(255, 255, 255, 0.8);
        
        --tile-name-text-color: rgba(0, 0, 0, 0.4);
        --tile-on-name-text-color: rgba(0, 0, 0, 1);
        
        --tile-state-text-color: rgba(0, 0, 0, 0.4);
        --tile-on-state-text-color: rgba(0, 0, 0, 1);
        
        --tile-state-changed-text-color: rgb(134, 134, 134);
        --tile-unavailable-state-text-color: rgba(255, 255, 255, 0.0);
        
        --tile-value-text-color: rgba(255, 0, 0, 1);
        
        
        --tile-icon-color: rgba(0, 0, 0, 0.3);
        --tile-on-icon-color: #24587d;
        
        
        --tile-width-mobile: 90px;
        --tile-height-mobile: 90px;
      }
    title: "Zu Hause"
    useBrightness: true
    useTemperature: true
    breakOnMobile: true
    statePositionTop: true
    entities:
      - title: Wetter
        entities: 
          - entity: weather.dark_sky
            tap_action:
              action: more-info
              entity: weather.dark_sky
      - title: Lichtstimmung Wohnzimmer
        entities: 
          - entity: input_boolean.switch_wohnzimmer_beleuchtung_hell
          - entity: input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
          - entity: input_boolean.switch_wohnzimmer_beleuchtung_automatik
          - entity: input_boolean.switch_wohnzimmer_beleuchtung_aus
          - entity: script.nachtlicht_an
      - title: Haushaltsgeräte
        entities: 
          - entity: sensor.status_spuelmaschine
            tap_action:
              action: more-info
              entity: sensor.status_spuelmaschine
          - entity: sensor.status_waschmaschine
            tap_action:
              action: more-info
              entity: sensor.status_waschmaschine
          - entity: sensor.status_trockner
            tap_action:
              action: more-info
              entity: sensor.status_trockner