---
title: Media Players
icon: 'mdi:television'
path: mediaplayers
panel: true
badges: []
popup_cards:
  media_player.tv_living_room:
    title: ""
    style: !include ../styles/popup.yaml
    card:
      type: custom:decluttering-card
      template: mediaplayer-popup-card
      variables:
        - media_player_entity: media_player.tv_living_room
        - media_player_icon: 'television'
        - speaker_entity: media_player.living_room
    deviceID: 
      - this
  media_player.chromecast:
    title: ""
    style: !include ../styles/popup.yaml
    card:
      type: custom:decluttering-card
      template: mediaplayer-popup-card
      variables:
        - media_player_entity: media_player.chromecast
        - media_player_icon: 'cast'
        - media_player_artwork: 'cover'
        - speaker_entity: media_player.wohnzimmer
    deviceID: 
      - this
  media_player.playstation_4_pro:
    title: ""
    style: !include ../styles/popup.yaml
    card:
      type: custom:decluttering-card
      template: mediaplayer-popup-card
      variables:
        - media_player_entity: media_player.playstation_4_pro
        - media_player_icon: 'playstation'
        - media_player_artwork: 'cover'
        - speaker_entity: media_player.living_room
    deviceID: 
      - this
  media_player.tv_laundry_room:
    title: ""
    style: !include ../styles/popup.yaml
    card:
      type: custom:decluttering-card
      template: mediaplayer-popup-card
      variables:
        - media_player_entity: media_player.tv_laundry_room
        - media_player_icon: 'television'
        - speaker_entity: media_player.tv_laundry_room
    deviceID: 
      - this


cards:
  - type: custom:homekit-card
    style: !include ../styles/homekit-card.yaml
    enableColumns: true
    rows:
      - row: 1
        columns:
          - column: 1
            entities:
              - title: Mediaplayer Wohnzimmer
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: button-card
                      variables:
                        - entity: binary_sensor.philipstv
                        - icon: television
                        - name: Fernseher
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: mediaplayer-card
                      variables:
                        - entity: media_player.chromecast
                        - icon: cast
                        - name: Chromecast
                        #- tap_action: more-info
                        - show_entity_picture: true
      - row: 2
        columns:
          - column: 1
            entities:
              - title: Kommende Episoden
                entities:
                  - card: custom:upcoming-media-card
                    noPadding: true
                    cardOptions:
                      entity: sensor.trakt_upcoming_calendar
                      position: 1
                  - card: custom:upcoming-media-card
                    noPadding: true
                    cardOptions:
                      entity: sensor.trakt_upcoming_calendar
                      position: 2
                  - card: custom:upcoming-media-card
                    noPadding: true
                    cardOptions:
                      entity: sensor.trakt_upcoming_calendar
                      position: 3
