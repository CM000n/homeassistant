---
title: Overview
icon: 'mdi:home'
path: overview
panel: true
badges: []


cards:
  - type: custom:homekit-card
    style: !include ../styles/homekit-card.yaml
    enableColumns: true
    rows:
      - row: 1
        columns:
          - column: 1
            entities:
              - title: Personen
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: person-card
                      variables:
                        - entity: person.simon
                        - entity_picture: /local/images/persons/simon_center.png
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: person-card
                      variables:
                        - entity: person.lisa
                        - entity_picture: /local/images/persons/lisa_center.png
      - row: 2
        columns:
          - column: 1
            entities:
              - title: Aktivität
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: vacuum.xiaomi_vacuum_cleaner
                        - name: Robi
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.status_waschmaschine
                        - name: Waschmaschine
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.status_trockner
                        - name: Trockner
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.status_spuelmaschine
                        - name: Spülmaschine
      - row: 3
        columns:
          - column: 1
            entities:
              - title: Klima
                entities:
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sun.sun
                        - name: Sonnenstand
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.darksky_temperature
                        - name: Außentemperatur
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.darksky_precip_probability
                        - name: Niederschlag
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.season
                        - name: Jahreszeit
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.darksky_wind_speed
                        - name: Wind
                  - card: custom:decluttering-card
                    noPadding: true
                    cardOptions:
                      template: sensor-card
                      variables:
                        - entity: sensor.darksky_humidity
                        - name: Luftfeuchtigkeit