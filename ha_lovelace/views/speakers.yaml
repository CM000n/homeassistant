---
title: Speakers
icon: 'mdi:speaker'
path: speakers
panel: true
badges: []
popup_cards:
  media_player.wohnzimmer:
    title: My popup
    card:
      type: entities
      entities:
        - media_player.wohnzimmer
        - media_player.schlafzimmer
        - media_player.bad
        - media_player.buro
    deviceID: 
      - this
