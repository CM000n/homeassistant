mini_graph_card:
  default:
    - font_size: 70
    - height: 90
  card:
    type: 'custom:mini-graph-card'
    style: |
      ha-card {
        background: var(--homekit-white);
        border-radius: 12px;
        color: var(--primary-background-color);
        --paper-item-icon-color: var(--primary-background-color);
        font-weight: bold;
      }
    entities: 
      - sensor.[[entity]]
    hour24: true
    animate: true
    font_size: '[[font_size]]'
    height: '[[height]]'
    show:
      icon: false
    font_size_header: 9
    line_color: '[[line_color]]'
    name: '[[name]]'




person_elements:
  card:
    type: picture-elements
    style: |
      ha-card {
        border-radius: 12px;
        overflow: hidden;
        background: var(--homekit-white);
        color: var(--primary-background-color);
      }
    image: '[[image]]'
    elements:
      - type: image
        entity: person.[[name]]
        image: '[[image]]'
        tap_action:
          action: more-info
        style:
          left: 50%
          top: 50%
          width: 100%
          heigth: 100%
      - type: state-label
        entity: person.[[name]]
        style:
          left: 0
          bottom: 0
          pointer-events: none
          font-size: 16px
          line-height: 24px
          color: white
          background-color: rgba(0, 0, 0, 0.3)
          width: 100%
          transform: initial
          padding: 0 8px
      - type: state-label
        entity: '[[battery]]'
        style:
          top: 0
          '[[direction]]': 0
          pointer-events: none
          transform: initial
          font-size: 12px
          color: rgba(255,255,255,0.8)
          line-height: 32px
          padding: 1px 35px
      - type: icon
        icon: mdi:cellphone-iphone
        style:
          top: 0
          '[[direction]]': 0
          pointer-events: none
          transform: scale(0.8)
          color: rgba(255,255,255,0.8)
          line-height: 32px
          padding: 8px 10px  
      - type: state-label
        entity: '[[mail]]'
        style:
          top: 0
          '[[direction]]': 0
          pointer-events: none
          transform: initial
          font-size: 12px
          color: rgba(255,255,255,0.8)
          line-height: 32px
          padding: 30px 35px
      - type: icon
        icon: mdi:email
        style:
          top: 0
          '[[direction]]': 0
          pointer-events: none
          transform: scale(0.8)
          color: rgba(255,255,255,0.8)
          line-height: 32px
          padding: 36px 10px
      - type: state-label
        entity: '[[reisezeit]]'
        style:
          top: 0
          '[[direction]]': 0
          pointer-events: none
          transform: initial
          font-size: 12px
          color: rgba(255,255,255,0.8)
          line-height: 32px
          padding: 58px 35px
      - type: icon
        icon: mdi:[[icon]]
        style:
          top: 0
          '[[direction]]': 0
          pointer-events: none
          transform: scale(0.8)
          color: rgba(255,255,255,0.8)
          line-height: 32px
          padding: 64px 10px




