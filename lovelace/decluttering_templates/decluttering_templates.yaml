climate_card:
  card:
    type: 'custom:thermostat-card'
    style: |
      ha-card {
        border-radius: 12px;
        background: var(--homekit-white);
        color: var(--primary-background-color);
      }
    ambient_temperature: '[[ambient_temperature]]'
    chevron_size: 100
    pending: 1
    entity: '[[entity]]'
    hvac:
      attribute: operation_mode
      states:
        'heat': 'heat'
        'off': 'off'
    step: 1




light_popup_card:
  card:
    type: 'custom:light-entity-card'
    style: |
      ha-card {
        background: var(--sidebar-background-color);
        opacity: 1.0;
        border-radius: 12px;
        color: var(--homekit-white;
      }
    entity: '[[entity]]'
    group: false
    persist_features: true
    header: ' '



light_button_card:
  default:
    - size: 30%
    - lock: false
    - color: auto
    - spin: false
    - show_state: true
    - show_label: true
    - show_last_changed: false
    - tap_action: toggle
    - hold_action: more-info
    - aspect_ratio: 1/1
  card:
    type: custom:button-card
    name: '[[name]]'
    icon: 'mdi:[[icon]]'
    size: '[[size]]'
    color: '[[color]]'
    lock: '[[lock]]'
    aspect_ratio: '[[aspect_ratio]]'
    entity: '[[entity]]'
    label: '[[label]]'
    show_state: '[[show_state]]'
    show_label: '[[show_label]]'
    show_last_changed: '[[show_last_changed]]'
    tap_action:
      action: '[[tap_action]]'
      haptic: light
    hold_action:
      action: '[[hold_action]]'
      haptic: success
    styles:
      card:
        - border-radius: 12px
        - --paper-card-background-color: var(--homekit-white)
      label:
        - justify-self: start
        - padding-left: 10px
        - font-weight: bold
        - font-family: Open Sans
        - font-size: 11px
      state:
        - font-size: 11px
        - font-family: Open Sans
        - padding: 0px 10px
        - justify-self: start
        - text-transform: capitalize
        - font-weight: bold
        - padding-left: 10px
      grid:
        - grid-template-areas: '"i" "n" "s" "l"'
        - grid-template-columns: 1fr
        - grid-template-rows: 1fr min-content min-content
      img_cell:
        - align-self: start
        - text-align: start
        - margin-right: 60px
      name:
        - justify-self: start
        - padding-left: 10px
        - font-weight: bold
        - font-family: Open Sans
        - font-size: 13px
    state:
      - value: "on" 
        spin: '[[spin]]'
        styles:
          name:
            - color: var(--primary-background-color)
          state:
            - color: var(--primary-background-color)
          label:
            - color: var(--primary-background-color)
          lock:
            - color: var(--primary-background-color)
      - value: "off"
        styles:
          card:
            - opacity: 0.4
          icon:
            - color: gray
          name:
            - color: gray
          state:
            - color: gray
          label:
            - color: gray
          lock:
            - color: black
      - value: "unavailable"
        styles:
          card:
            - opacity: 0.2
          icon:
            - color: gray
          state:
            - color: gray
          label:
            - color: gray
          name:
            - color: gray




# Standard Button Card (Used throughout most of my setup)
switch_button_card:
  default:
    - size: 25%
    - lock: false
    - color: auto
    - background_color: var(--homekit-white)
    - variable: spin
    - spin: false
    - show_name: true
    - show_state: true
    - show_label: true
    - show_icon: true
    - show_last_changed: false
    - tap_action:
        action: toggle
        haptic: light
    - hold_action:
        action: more-info
        haptic: success
    - aspect_ratio: 1/1
    - margin-right: 60px
    - label: '&nbsp;'
    - opacity: 0.4
    - off_icon_color: gray
    - off_name_color: gray
    - off_state_color: gray
  card:
    type: custom:button-card
    name: '[[name]]'
    icon: 'mdi:[[icon]]'
    size: '[[size]]'
    color: '[[color]]'
    lock: '[[lock]]'
    aspect_ratio: '[[aspect_ratio]]'
    entity: '[[entity]]'
    label: '[[label]]'
    show_name: '[[show_name]]'
    show_icon: '[[show_icon]]'
    show_state: '[[show_state]]'
    show_label: '[[show_label]]'
    show_last_changed: '[[show_last_changed]]'
    tap_action: '[[tap_action]]'
    hold_action: '[[hold_action]]'
    styles:
      card:
        - border-radius: 12px
        - --paper-card-background-color: '[[background_color]]'
      label:
        - color: var(--primary-background-color)
        - font-size: 11px
        - font-family: Open Sans
        - padding: 0px 10px
        - justify-self: start
      state:
        - font-size: 11px
        - font-family: Open Sans
        - padding: 0px 10px
        - justify-self: start
        - text-transform: capitalize
        - font-weight: bold
        - padding-left: 10px
        - color: gray
      grid:
        - grid-template-areas: '"i" "n" "s" "l"'
        - grid-template-columns: 1fr
        - grid-template-rows: 1fr min-content min-content
      img_cell:
        - align-self: start
        - text-align: start
        - margin-right: '[[margin-right]]'
      name:
        - justify-self: start
        - padding-left: 10px
        - font-weight: bold
        - font-family: Open Sans 
        - font-size: 13px
    state:
      - value: "on"
        '[[variable]]': '[[spin]]'
        styles:
          name:
            - color: var(--primary-background-color)
          state:
            - color: var(--primary-background-color)
          lock:
            - color: var(--primary-background-color)
          label:
            - color: var(--primary-background-color)
      - value: "playing"
        '[[variable]]': '[[spin]]'
        styles:
          name:
            - color: var(--primary-background-color)
          state:
            - color: var(--primary-background-color)
          lock:
            - color: var(--primary-background-color)
          label:
            - color: var(--primary-background-color)
      - value: "Spült"
        '[[variable]]': '[[spin]]'
        styles:
          name:
            - color: var(--primary-background-color)
          state:
            - color: var(--primary-background-color)
          lock:
            - color: var(--primary-background-color)
          label:
            - color: var(--primary-background-color)
      - value: "Trocknet"
        '[[variable]]': '[[spin]]'
        styles:
          name:
            - color: var(--primary-background-color)
          state:
            - color: var(--primary-background-color)
          lock:
            - color: var(--primary-background-color)
          label:
            - color: var(--primary-background-color)
      - value: "Wäscht"
        '[[variable]]': '[[spin]]'
        styles:
          name:
            - color: var(--primary-background-color)
          state:
            - color: var(--primary-background-color)
          lock:
            - color: var(--primary-background-color)
          label:
            - color: var(--primary-background-color)
      - value: "off"
        styles:
          card:
            - opacity: '[[opacity]]'
          icon:
            - color: '[[off_icon_color]]'
          name:
            - color: '[[off_name_color]]'
          state:
            - color: '[[off_state_color]]'
          label:
            - color: '[[off_state_color]]'
          lock:
            - color: black
      - value: "idle"
        styles:
          card:
            - opacity: 0.7
          name:
            - color: gray
          label:
            - color: gray
          icon:
            - color: gray
      - value: "paused"
        styles:
          card:
            - opacity: 0.7
          name:
            - color: gray
          label:
            - color: gray
          icon:
            - color: gray
      - value: "Fertig"
        styles:
          card:
            - opacity: 0.7
          name:
            - color: gray
          label:
            - color: gray
          icon:
            - color: gray
      - value: "Aus"
        styles:
          card:
            - opacity: '[[opacity]]'
          icon:
            - color: '[[off_icon_color]]'
          name:
            - color: '[[off_name_color]]'
          state:
            - color: '[[off_state_color]]'
          label:
            - color: '[[off_state_color]]'
          lock:
            - color: black
      - value: "unavailable"
        styles:
          card:
            - opacity: 0.2
