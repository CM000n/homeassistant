type: vertical-stack
cards:
  - type: custom:decluttering-card
    template: header_text
    variables:
      - content: 'Benachrichtigungen und Ereignisse'




  - type: conditional
    conditions:
      - entity: sensor.status_spuelmaschine
        state: "Aus"
      - entity: sensor.status_waschmaschine
        state_not: "Wäscht"
      - entity: sensor.status_trockner
        state_not: "Trocknet"
      - entity: binary_sensor.wasserstand
        state_not: "on"
      - entity: calendar.contacts
        state: "off"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(124, 205, 74, 0.5)
        - icon: check-box-outline
        - content: Alles ist ruhig. Es gibt aktuell keine Meldungen.

  - type: conditional
    conditions:
      - entity: sensor.status_spuelmaschine
        state_not: "Aus"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(9, 195, 242, 0.5)
        - icon: dishwasher
        - content: Die Spülmaschine befindet sich im Spülvorgang.

  - type: conditional
    conditions:
      - entity: sensor.status_waschmaschine
        state: "Wäscht"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(216, 32, 164, 0.5)
        - icon: washing-machine
        - content: Die Waschmaschine befindet sich im Waschvorgang.

  - type: conditional
    conditions:
      - entity: sensor.status_trockner
        state: "Trocknet"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(176, 66, 44, 0.5)
        - icon: tumble-dryer
        - content: Der Trockner befindet sich im Trockenvorgang.

  - type: conditional
    conditions:
      - entity: binary_sensor.wasserstand
        state: "on"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(240, 12, 0, 0.5)
        - icon: leaf
        - content: Der Wasserstand der Balkonbewässerung ist niedrig!

  - type: conditional
    conditions:
      - entity: sensor.batteriestand_simon_handy
        state: "Niedrig"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(255, 105, 25, 0.5)
        - icon: battery-10
        - content: Simons Handyakku hat nur noch [[ sensor.google_maps_113462452053772321900_battery_level.state ]] % und sollte aufgeladen werden!

  - type: conditional
    conditions:
      - entity: sensor.batteriestand_heizung_bad
        state: "Niedrig"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(255, 105, 25, 0.5)
        - icon: battery-10
        - content: Die Batterie im Bad Thermostat hat nur noch [[ sensor.heizung_bad_battery_level.state ]] % und sollte ausgetauscht werden!

  - type: conditional
    conditions:
      - entity: sensor.batteriestand_heizung_buro
        state: "Niedrig"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(255, 105, 25, 0.5)
        - icon: battery-10
        - content: Die Batterie im Büro Thermostat hat nur noch [[ sensor.heizung_buro_battery_level.state ]] % und sollte ausgetauscht werden!

  - type: conditional
    conditions:
      - entity: calendar.contacts
        state: "on"
    card:
      type: custom:decluttering-card
      template: notification_card
      variables:
        - color: rgba(255, 180, 50, 0.5)
        - icon: calendar-month-outline
        - content: Reminder - [[ calendar.contacts.attributes.message ]] !