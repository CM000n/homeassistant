# Maintenance View Popup Card
  input_boolean.lovelace_maintenance:
    title: Wartung
    style:
      border-radius: 12px
      background: var(--primary-background-color)
    card:
      type: vertical-stack
      cards: 
        - type: horizontal-stack
          cards:
            - type: 'custom:button-card'
              color_type: blank-card
              styles:
                card:
                  - width: 10px 
            - type: conditional
              conditions:
                - entity: input_select.wartung
                  state_not: Putzen
              card:
                type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - entity: input_select.wartung
                  - name: Putzen
                  - label: Putzliste
                  - icon: broom
                  - color: gray
                  - show_state: false
                  - margin-right: 40px
                  - tap_action:
                      action: call-service
                      service: input_select.select_option
                      service_data:
                        option: Putzen
                        entity_id: input_select.wartung
                      haptic: light
            - type: conditional
              conditions:
                - entity: input_select.wartung
                  state: Putzen
              card:
                type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - entity: input_select.wartung
                  - name: Putzen
                  - label: Putzliste
                  - icon: broom
                  - color: var(--primary-background-color)
                  - opacity: 1.0
                  - show_state: false
                  - margin-right: 40px
                  - tap_action:
                      action: call-service
                      service: input_select.select_option
                      service_data:
                        option: Putzen
                        entity_id: input_select.wartung
                      haptic: light
            - type: conditional
