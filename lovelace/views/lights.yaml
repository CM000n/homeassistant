title: Licht
path:  lights
popup_cards:
  !include ../popup-cards/light-popup.yaml

cards:
  - type: vertical-stack
    cards:
      - type: custom:decluttering-card
        template: header_text
        variables:
          - content: 'Wohn- / Esszimmer'
      - type: horizontal-stack
        cards:
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px
          - type: custom:decluttering-card
            template: light_button_card
            variables:
              - entity: light.deckenlampe_wohnzimmer
              - name: Wohnzimmer
              - icon: ceiling-light
              - label: !include ../includes/brightness-label.yaml
          - type: custom:decluttering-card
            template: light_button_card
            variables:
              - entity: light.lightstrip_wohnzimmer
              - name: Lightstrip
              - icon: led-strip
              - lock: true
              - label: !include ../includes/brightness-label.yaml
          - type: custom:decluttering-card
            template: light_button_card
            variables:
              - entity: light.deckenlampe_herd
              - name: Herd
              - icon: ceiling-light
              - label: !include ../includes/brightness-label.yaml
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px
      - type: horizontal-stack
        cards:
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px
          - type: custom:decluttering-card
