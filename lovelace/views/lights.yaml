              - icon: floor-lamp
              - label: !include ../includes/brightness-label.yaml
          - type: custom:button-card
            color_type: blank-card
            aspect_ratio: 1/1
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px
