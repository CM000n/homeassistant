title: Licht
path:  lights
panel: true

cards:
  - type: "custom:homekit-card"
    useBrightness: true
    useTemperature: true
    breakOnMobile: true
    entities:
      - title: Wohn- / Esszimmer
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities: 
          - entity: light.deckenlampe_wohnzimmer
            popupExtend:
              actions:
                - service: homeassistant.turn_on
                  service_data:
                    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_gemuetlich
                  color: "#FDCA64"
                  name: Gemütlich
                - service: homeassistant.turn_on
                  service_data:
                    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_hell
                  color: "#BBEEF3"
                  name: Hell
                - service: homeassistant.turn_on
                  service_data:
                    entity_id: input_boolean.switch_wohnzimmer_beleuchtung_automatik
                  color: "#FFE7C0"
                  name: Automatik
          - entity: light.lightstrip_wohnzimmer
          - entity: light.stehlampe_wohnzimmer_links
          - entity: light.stehlampe_wohnzimmer_rechts
          - entity: light.deckenlampe_herd
      - title: Schlafzimmer / Ankleide
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.schlafzimmer_deckenlampe_light
          - entity: light.schlafzimmer_nachttisch_lisa_light
          - entity: light.schlafzimmer_nachttisch_simon_light
          - entity: light.ankleide_deckenlampe_light
          - entity: light.ankleide_schreibtisch_light
      - title: Badezimmer
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.shelly_deckenlampe_bad
          - entity: light.shelly_badspiegel
      - title: Büro
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.deckenlampe_buro
          - entity: light.schirmlampe_buero
      - title: Flur / Treppenhaus
        popup:
          type: custom:light-popup-card
          scenesInARow: 2
          brightnessWidth: 130px
          brightnessHeight: 350px
          switchWidth: 110px
          switchHeight: 300px
        entities:
          - entity: light.deckenlampen_flur
          - entity: light.wandlampen_treppenhaus
