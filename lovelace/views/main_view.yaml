title: Home
path: home
icon: mdi:home
popup_cards:
  !include ../popup-cards/main-view-popup-card.yaml
cards:
  - type: vertical-stack
    cards:

# Weather Panel
      - type: horizontal-stack
        cards:
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px
          - type: custom:simple-weather-card
            style: |
              ha-card {
                background: var(--homekit-white);
                border-radius: 12px;
                --primary-text-color: var(--primary-background-color);
              }
            entity: weather.dark_sky
            name: "Kraichtal"
            backdrop: false
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px

# Person Panel Left Photo
      - type: horizontal-stack
        cards:
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px
          - type: conditional
            conditions:
              - entity: person.lisa
                state_not: "home"
            card:
              type: custom:decluttering-card
              template: person_elements_lisa
              variables:
                - name: lisa
                - direction: left
                - image: '/local/lisa_small_2.png'
                - reisezeit: sensor.von_der_arbeit_nach_hause
                - icon: home
          - type: conditional
            conditions:
              - entity: person.lisa
                state: "home"
            card:
              type: custom:decluttering-card
              template: person_elements_lisa
              variables:
                - name: lisa
                - direction: left
                - image: '/local/lisa_small_2.png'
                - reisezeit: sensor.von_zu_hause_zur_arbeit
                - icon: office-building

# Person Panel Right Photo
          - type: conditional
            conditions:
              - entity: person.simon
                state_not: "home"
            card:
              type: custom:decluttering-card
              template: person_elements
              variables:
                - name: simon
                - direction: right
                - image: '/local/simon_small_2.png'
                - reisezeit: sensor.von_simon_nach_hause
                - battery: sensor.google_maps_113462452053772321900_battery_level
                - mail: !secret simonmailsensor
                - icon: home
          - type: conditional
            conditions:
              - entity: person.simon
                state: "home"
            card:
              type: custom:decluttering-card
              template: person_elements
              variables:
                - name: simon
                - direction: right
                - image: '/local/simon_small_2.png'
                - reisezeit: sensor.von_simon_zur_arbeit
                - battery: sensor.google_maps_113462452053772321900_battery_level
                - mail: !secret simonmailsensor
                - icon: office-building
          - type: 'custom:button-card'
            color_type: blank-card
            styles:
              card:
                - width: 10px

# Frontpage Buttons
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
                    - width: 10px
              - type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - name: Multimedia
                  - label: Bedienung
                  - icon: remote
                  - show_state: false
                  - tap_action: 
                      action: more-info
                      haptic: light
                  - entity: input_boolean.lovelace_remote
                  - margin-right: 40px
                  - color: var(--primary-background-color)
                  - opacity: 0.7
              - type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - name: Automatiken
                  - label: Ein-/Aus
                  - icon: alpha-a-box
                  - show_state: false
                  - tap_action: 
                      action: more-info
                      haptic: light
                  - entity: input_boolean.lovelace_automation
                  - margin-right: 40px
                  - color: var(--primary-background-color)
                  - opacity: 0.7
              - type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - name: Szenen
                  - label: Einstellungen
                  - icon: google-pages
                  - show_state: false
                  - tap_action: 
                      action: more-info
                      haptic: light
                  - entity: input_boolean.lovelace_scenes
                  - margin-right: 40px
                  - color: var(--primary-background-color)
                  - opacity: 0.7
              - type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - name: Wartung
                  - label: Reinigen
                  - icon: broom
                  - show_state: false
                  - tap_action: 
                      action: more-info
                      haptic: light
                  - entity: input_boolean.lovelace_maintenance
                  - margin-right: 40px
                  - color: var(--primary-background-color)
                  - opacity: 0.7
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
                    - width: 10px
          - type: horizontal-stack
            cards:
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
                    - width: 10px
              - type: custom:decluttering-card
                template: switch_button_card
                variables:
                  - name: Geräte
                  - label: Eingeschaltet
                  - icon: power-cycle
                  - show_state: false
                  - tap_action: 
                      action: more-info
                      haptic: light
                  - entity: input_boolean.lovelace_now_on
                  - margin-right: 40px
                  - color: var(--primary-background-color)
                  - opacity: 0.7
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
              - type: 'custom:button-card'
                color_type: blank-card
                styles:
                  card:
                    - width: 10px

  # Notifications Panel
  - !include ../notifications/notifications.yaml