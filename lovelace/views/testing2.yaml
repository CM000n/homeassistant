title: Geräte_t
path:  geraetet
panel: true

cards:
  - type: "custom:homekit-card"
    useBrightness: true
    useTemperature: true
    breakOnMobile: true
    entities:
      - title: Wohn- / Esszimmer
        entities: 
          - entity: binary_sensor.philipstv
          - entity: media_player.chromecast_wohnzimmer
          - entity: media_player.sonos_wohnzimmer
          - entity: switch.steckdose_wohnzimmer_lowboard
          - entity: sensor.status_spuelmaschine
      - title: Schlafzimmer / Ankleide
        entities:
          - entity: media_player.sonos_schlafzimmer
      - title: Badezimmer
        entities:
          - entity: media_player.sonos_bad
      - title: Büro
        entities:
          - entity: binary_sensor.openmediavault
          - entity: binary_sensor.simondrucker
          - entity: switch.simon_pc
          - entity: media_player.sonos_buero
      - title: Keller
        entities:
          - entity: sensor.status_waschmaschine
          - entity: sensor.status_trockner
      - title: Außen
        entities:
          - entity: switch.wasserpumpe
